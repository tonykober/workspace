<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DVC3 Tier List Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0a18;font-family:'Noto Sans TC',sans-serif;color:#fff;height:100vh;display:flex;flex-direction:column}
.header{padding:12px 20px;display:flex;align-items:center;gap:16px;background:#1a1228;border-bottom:1px solid #2d2140}
.header h1{font-size:20px;color:#ffd700;flex-shrink:0}
.header h1 span{font-size:14px;color:#888;font-weight:normal;margin-left:8px}
.tabs{display:flex;gap:4px}
.tabs button{padding:8px 20px;border:none;border-radius:6px 6px 0 0;background:#222;color:#aaa;font-size:14px;cursor:pointer;transition:all .2s}
.tabs button:hover{background:#333;color:#fff}
.tabs button.active{background:#2d2140;color:#ffd700;font-weight:bold}
.iframe-container{flex:1;position:relative}
.iframe-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
</style>
</head><body>
<div class="header">
<h1>DVC3 Tier List<span>Hub</span></h1>
<div class="tabs">
<button class="active" onclick="switchTab('v2',this)">v2 (Interactive)</button>
<button onclick="switchTab('image',this)">Image Version</button>
<button onclick="switchTab('v1',this)">v1 (Original)</button>
</div>
</div>
<div class="iframe-container">
<iframe id="content-frame" src="dvc3-tierlist-v2.html"></iframe>
</div>
<script>
var pages = {
 v2: 'dvc3-tierlist-v2.html',
 image: 'dvc3-tierlist-image.html',
 v1: 'dvc3-tierlist.html'
};
function switchTab(key, btn) {
 document.getElementById('content-frame').src = pages[key];
 document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
}
</script>
</body></html>
