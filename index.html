<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>秘書工作台</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--red:#f85149;--yellow:#d29922;--green:#3fb950}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;position:relative;flex-wrap:wrap}
header h1{font-size:20px;font-weight:600}
header span{color:var(--muted);font-size:14px;margin-left:12px}
.tabs{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.tab{padding:8px 16px;cursor:pointer;color:var(--muted);font-size:14px;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
@media(max-width:600px){header{flex-direction:column;align-items:flex-start;gap:8px}.tabs{position:static;transform:none;width:100%;justify-content:center}}
.container{max-width:1200px;margin:0 auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;position:relative;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start}
.card h3{font-size:16px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex:1}
.card h3 a{color:var(--text);text-decoration:none}
.card h3 a:hover{color:var(--accent)}
.card p{color:var(--muted);font-size:14px;line-height:1.5}
.card .date{color:var(--accent);font-size:13px;margin-top:8px}
.card .actions{display:flex;gap:8px;flex-shrink:0}
.actions button{background:none;border:none;cursor:pointer;font-size:16px;padding:2px;opacity:0.6;transition:opacity .2s}
.actions button:hover{opacity:1}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.empty p{margin-top:8px;font-size:14px}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:999}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:360px;text-align:center}
.confirm-box p{margin-bottom:16px;color:var(--text)}
.confirm-box .btns{display:flex;gap:10px;justify-content:center}
.confirm-box button{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-size:14px}
.confirm-box .btn-yes{background:var(--red);color:#fff}
.confirm-box .btn-no{background:var(--border);color:var(--text)}
.page-hidden{display:none}
</style>
</head>
<body>
<div id="lockScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px">
<h2 style="color:var(--accent)">🔒 秘書工作台</h2>
<input id="pwdInput" type="password" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')unlock()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 16px;color:var(--text);font-size:14px;width:200px;text-align:center">
<button onclick="unlock()" style="background:var(--accent);border:none;border-radius:6px;padding:8px 20px;color:#fff;cursor:pointer;font-size:14px">進入</button>
<p id="pwdErr" style="color:var(--red);font-size:13px;display:none">密碼錯誤</p>
</div>
<div id="mainContent" style="display:none">
<header>
<h1 style="cursor:pointer" onclick="if(confirm('確定清除快取並重新載入？')){localStorage.removeItem('workspace_index');location.reload()}" title="點擊清除快取並重新載入">📐 秘書工作台</h1>
<span>圖解 · 文件 · 畫布</span>
<div class="tabs">
<div class="tab active" onclick="switchTab('main')">📄 主頁</div>
<div class="tab" onclick="switchTab('archive')">📦 封存 (<span id="archCount" style="display:inline-block;min-width:1em;text-align:center">0</span>)</div>
</div>
</header>
<div class="container">
<div id="mainPage">
<div class="grid" id="mainGrid"></div>
<div class="empty" id="mainEmpty" style="display:none"><p>🎨 尚無內容</p><p>老爺下指令後，作品會出現在這裡</p></div>
</div>
<div id="archivePage" class="page-hidden">
<div class="grid" id="archiveGrid"></div>
<div class="empty" id="archiveEmpty" style="display:none"><p>📦 沒有封存的項目</p></div>
</div>
</div>
<div class="confirm-overlay" id="confirmOverlay">
<div class="confirm-box">
<p id="confirmMsg"></p>
<div class="btns">
<button class="btn-yes" onclick="confirmAction()">確定</button>
<button class="btn-no" onclick="closeConfirm()">取消</button>
</div>
</div>
</div>
</div><!-- end mainContent -->
<script>
function unlock(){
  crypto.subtle.digest('SHA-256',new TextEncoder().encode(document.getElementById('pwdInput').value)).then(function(buf){
    var h=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
    if(h==='1bc04b5291c26a46d918139138b992d2de976d6851d0893b0476b85bfbdfc6e6'){
      document.getElementById('lockScreen').style.display='none';
      document.getElementById('mainContent').style.display='block';
      sessionStorage.setItem('ws_unlocked','1');
      load();
    }else{document.getElementById('pwdErr').style.display='block'}
  });
}
if(sessionStorage.getItem('ws_unlocked')==='1'){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('mainContent').style.display='block';
}
let items=[],currentTab='main',pendingAction=null;
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbz8k4bBNI-8IwICwN4EUSKaJtHOYvz-3s13UnZ3QZDuzlVgAGwa9mY91J3WP1apb50TDg/exec';
const SHEET_ID='12GcnSkOnxfZoiMU6a7402fmZ-h3MIxusBB4nbMChB2s';

async function load(){
  try{
    const res=await fetch('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet=items&t='+Date.now(),{cache:'no-store'});
    if(res.ok){
      const csv=await res.text();
      const rows=csv.trim().split('\n').filter(r=>r);
      if(rows.length){
        items=rows.map(r=>{const cols=r.match(/(".*?"|[^,]+)/g)||[];const clean=s=>(s||'').replace(/^"|"$/g,'');return{title:clean(cols[0]),desc:clean(cols[1]),icon:clean(cols[2]),path:clean(cols[3]),date:clean(cols[4]),archived:clean(cols[5])==='TRUE'}});
      }
    }
  }catch(e){}
  if(!items.length){
    try{const res=await fetch('data/index.json?t='+Date.now());if(res.ok)items=await res.json()}catch(e){}
  }
  if(!items.length){
    items=[{"title":"團隊架構圖","desc":"AI 助理團隊組織架構、成員分工與通訊方式","icon":"🏗️","path":"team-structure.html","date":"2026-05-18"},{"title":"FZG專案追蹤器-系統架構與規範","desc":"系統概覽、同步機制、設定格式、功能架構、規則與限制","icon":"📋","path":"fzg-docs.html","date":"2026-05-21"},{"title":"街機遊戲設計發想","desc":"市場研究、玩法提案、美術風格、GDD、操作配置、投幣與營收","icon":"🎮","path":"game-design.html","date":"2026-05-24"},{"title":"街機遊戲 — 美術開發製程分析","desc":"美術資源沿用、風格調整、人力需求、工時評估","icon":"🎨","path":"game-dev-analysis.html","date":"2026-05-24"},{"title":"街機遊戲 — 美術開發製程分析（v2 重構版）","desc":"三區塊架構：現況盤點 · 製作規劃 · 執行規範","icon":"🎨","path":"game-dev-analysis-v2.html","date":"2026-05-24"},{"title":"街機遊戲 — 美術開發製程分析（v2.1 三分頁版）","desc":"獨立三區塊：現況盤點 · 製作規劃 · 執行規範","icon":"🎨","path":"game-dev-analysis-v2.1.html","date":"2026-05-25"},{"title":"AI 動作工具採用計畫","desc":"動作AI工具選型、應用方式、覆蓋範圍","icon":"🎬","path":"ai-animation-tools.html","date":"2026-05-26"},{"title":"台股 ETF 績效追蹤","desc":"6檔熱門ETF股價、報酬率、殖利率、持股產業分布","icon":"📊","path":"tw-etf-tracker.html","date":"2026-05-27"}];
  }
  render();
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='main'?0:1)));
  document.getElementById('mainPage').classList.toggle('page-hidden',tab!=='main');
  document.getElementById('archivePage').classList.toggle('page-hidden',tab!=='archive');
}

function render(){
  const active=items.filter(i=>!i.archived);
  const archived=items.filter(i=>i.archived);
  document.getElementById('archCount').textContent=archived.length;
  // Main
  const mg=document.getElementById('mainGrid');
  if(!active.length){mg.innerHTML='';document.getElementById('mainEmpty').style.display='block'}
  else{document.getElementById('mainEmpty').style.display='none';mg.innerHTML=active.map(item=>{const idx=items.indexOf(item);return cardHtml(item,idx,'main')}).join('')}
  // Archive
  const ag=document.getElementById('archiveGrid');
  if(!archived.length){ag.innerHTML='';document.getElementById('archiveEmpty').style.display='block'}
  else{document.getElementById('archiveEmpty').style.display='none';ag.innerHTML=archived.map(item=>{const idx=items.indexOf(item);return cardHtml(item,idx,'archive')}).join('')}
}

function cardHtml(item,idx,page){
  const link=page==='archive'?item.path+'?from=archive':item.path+'?from=main';
  const btns=page==='main'
    ?`<button onclick="archiveItem(${idx})" title="封存">📦</button><button onclick="deleteItem(${idx})" title="刪除">🗑️</button>`
    :`<button onclick="restoreItem(${idx})" title="恢復">🔄</button><button onclick="deleteItem(${idx})" title="永久刪除">🗑️</button>`;
  const dateStr=item.date?(item.date.includes('T')?'最後修改：'+item.date.replace('T',' '):'最後修改：'+item.date):'';
  return `<div class="card"><div class="card-header"><h3><a href="${link}">${item.icon||'📄'} ${item.title}</a></h3><div class="actions">${btns}</div></div><p>${item.desc||''}</p><div class="date">${dateStr}</div></div>`;
}

function archiveItem(idx){pendingAction={type:'archive',idx};showConfirm(`確定要封存「${items[idx].title}」嗎？`)}
function deleteItem(idx){pendingAction={type:'delete',idx};showConfirm(`確定要永久刪除「${items[idx].title}」嗎？此操作無法恢復。`)}
function restoreItem(idx){items[idx].archived=false;save();render()}
function showConfirm(msg){document.getElementById('confirmMsg').textContent=msg;document.getElementById('confirmOverlay').style.display='flex'}
function closeConfirm(){document.getElementById('confirmOverlay').style.display='none';pendingAction=null}
function confirmAction(){
  if(!pendingAction)return;
  if(pendingAction.type==='archive')items[pendingAction.idx].archived=true;
  else if(pendingAction.type==='delete')items.splice(pendingAction.idx,1);
  save();render();closeConfirm();
}
function save(){
  localStorage.setItem('workspace_index',JSON.stringify(items));
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'save',items:items})});
}
if(sessionStorage.getItem('ws_unlocked')==='1')load();
if(window.location.hash==='#archive')switchTab('archive');
</script>
</body>
</html>
