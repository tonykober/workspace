<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>秘書工作台</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
header h1{font-size:20px;font-weight:600}
header span{color:var(--muted);font-size:14px}
.container{max-width:1200px;margin:0 auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card h3{font-size:16px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.card p{color:var(--muted);font-size:14px;line-height:1.5}
.card .count{color:var(--accent);font-size:13px;margin-top:8px}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.empty p{margin-top:8px;font-size:14px}
a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
<h1>📐 秘書工作台</h1>
<span>圖解 · 文件 · 畫布</span>
</header>
<div class="container">
<div class="grid" id="items"></div>
<div class="empty" id="empty" style="display:none">
<p>🎨 尚無內容</p>
<p>老爺下指令後，作品會出現在這裡</p>
</div>
</div>
<script>
async function load(){
  try{
    const res=await fetch('data/index.json');
    if(!res.ok)throw new Error();
    const items=await res.json();
    if(!items.length){document.getElementById('empty').style.display='block';return}
    const grid=document.getElementById('items');
    grid.innerHTML=items.map(item=>`
      <a href="${item.path}" class="card">
        <h3>${item.icon||'📄'} ${item.title}</h3>
        <p>${item.desc||''}</p>
        <div class="count">${item.date||''}</div>
      </a>
    `).join('');
  }catch(e){document.getElementById('empty').style.display='block'}
}
load();
</script>
</body>
</html>
