<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">

<title>台股 ETF 績效追蹤</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #131829;
  --surface2: #1a2035;
  --border: #2a3050;
  --text: #e8ecf4;
  --muted: #7a8599;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }

.header { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border-bottom:1px solid var(--border); padding:16px 20px; position:sticky; top:0; z-index:100; backdrop-filter:blur(10px); }
.header h1 { font-size:1.3rem; background:linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header .subtitle { font-size:0.8rem; color:var(--muted); margin-top:2px; }

.container { max-width:1200px; margin:0 auto; padding:16px; }

.cards { display:grid; grid-template-columns:1fr; gap:16px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; transition:transform .2s, box-shadow .2s; }
.card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,212,255,.08); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-left { display:flex; align-items:center; gap:8px; }
.card-ticker { font-size:1.7rem; font-weight:700; color:var(--accent); }
.card-name { font-size:0.9rem; color:var(--muted); }
.card-type { font-size:0.65rem; padding:2px 6px; border-radius:4px; background:var(--accent2); color:#fff; font-weight:500; white-space:nowrap; }
.card-right { text-align:right; }
.card-price { font-size:1.3rem; font-weight:700; }
.card-change { font-size:0.8rem; font-weight:600; padding:2px 6px; border-radius:5px; display:inline-block; margin-top:2px; }
.card-change.up { color:var(--red); background:rgba(239,68,68,.12); }
.card-change.down { color:var(--green); background:rgba(16,185,129,.12); }

.fund-info-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.fund-info-row .fi-item { text-align:center; }
.fund-info-row .fi-label { font-size:0.65rem; color:var(--muted); }
.fund-info-row .fi-value { font-size:0.8rem; font-weight:700; margin-top:1px; white-space:nowrap; }
.premium-value.cheap { color:var(--green); }
.premium-value.expensive { color:var(--red); }
.premium-value.normal { color:var(--muted); }
.premium-tag { font-size:0.6rem; white-space:nowrap; padding:1px 5px; border-radius:3px; margin-left:4px; }
.cheap .premium-tag { background:rgba(16,185,129,.15); }
.expensive .premium-tag { background:rgba(239,68,68,.15); }
.normal .premium-tag { background:rgba(139,148,158,.15); }
.dividend-inline { font-size:0.82rem; color:var(--text); margin-bottom:8px; }

.card-section { padding-top:10px; margin-top:10px; border-top:1px solid var(--border); }
.card-section-title { font-size:0.7rem; color:var(--muted); margin-bottom:6px; font-weight:600; }

.holdings-toggle { cursor:pointer; user-select:none; }
.holdings-toggle::after { content:' ▼'; display:inline; font-size:0.6rem; transition:transform .3s; }
.card-section.open .holdings-toggle::after { content:' ▲'; }
.holdings-content { max-height:0; overflow:hidden; transition:max-height .3s ease; }
.card-section.open .holdings-content { max-height:400px; }
.holding-bar { display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:0.7rem; }
.holding-bar .hb-name { width:50px; text-align:right; color:var(--muted); flex-shrink:0; }
.holding-bar .hb-track { flex:1; height:14px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.holding-bar .hb-fill { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:3px; }
.holding-bar .hb-pct { width:38px; font-weight:600; font-size:0.68rem; }

.returns-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.return-item { text-align:center; }
.return-label { font-size:0.68rem; color:var(--muted); }
.return-value { font-size:0.85rem; font-weight:700; margin-top:2px; }
.return-value.positive { color:var(--red); }
.return-value.negative { color:var(--green); }

.dividend-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:8px; }
.div-item-label { font-size:0.68rem; color:var(--muted); }
.div-item-value { font-size:0.85rem; font-weight:700; margin-top:1px; }

.recent-div { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.recent-div-item { font-size:0.7rem; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:3px 6px;  }
.recent-div-item .rd-date { color:var(--muted); }
.recent-div-item .rd-amt { color:var(--yellow); font-weight:600; margin-left:4px; }

.sector-area { display:flex; align-items:center; gap:12px; }
.sector-chart { width:100px; height:100px; flex-shrink:0; }
.sector-legend { flex:1; }
.sector-legend-item { display:flex; align-items:center; gap:4px; font-size:0.7rem; margin-bottom:2px; }
.sector-legend-item .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sector-legend-item .sl-name { color:var(--muted); }
.sector-legend-item .sl-pct { margin-left:auto; font-weight:600; }

@media (min-width:768px) {
  .container { padding:24px; }
  .cards { grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:16px; }
  .header { padding:20px 32px; }
  .header h1 { font-size:1.6rem; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.main-tabs { display:flex; gap:4px; padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); }
.main-tab { padding:6px 16px; border-radius:20px; font-size:0.85rem; cursor:pointer; color:var(--muted); border:1px solid var(--border); transition:all .2s; }
.main-tab.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
.add-btn { background:var(--accent); color:#000; border:none; padding:6px 14px; border-radius:6px; font-size:0.82rem; font-weight:600; cursor:pointer; }
.add-btn:hover { opacity:0.8; }
.wl-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; position:relative; }
.wl-card .wl-top { display:flex; justify-content:space-between; align-items:flex-start; }
.wl-card .wl-ticker { font-size:1.4rem; font-weight:700; color:var(--accent); }
.wl-card .wl-name { font-size:0.8rem; color:var(--muted); }
.wl-card .wl-price { font-size:1.2rem; font-weight:700; }
.wl-card .wl-change { font-size:0.8rem; padding:2px 8px; border-radius:4px; }
.wl-card .wl-change.up { color:var(--red); background:rgba(239,68,68,.12); }
.wl-card .wl-change.down { color:var(--green); background:rgba(16,185,129,.12); }
.wl-delete { position:absolute; top:8px; right:8px; background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; padding:4px 8px; border-radius:4px; }
.wl-delete:hover { background:rgba(239,68,68,.15); color:var(--red); }
.confirm-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:999; }
.confirm-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; max-width:300px; text-align:center; }
.confirm-box p { margin-bottom:16px; color:var(--text); }
.confirm-box .btns { display:flex; gap:10px; justify-content:center; }
.confirm-box button { padding:8px 20px; border-radius:6px; border:none; cursor:pointer; font-size:14px; }
.confirm-box .btn-yes { background:var(--red); color:#fff; }
.confirm-box .btn-no { background:var(--border); color:var(--text); }
</style>
</head>

function getPremiumClass(p) {
  if (p < -0.3) return 'cheap';
  if (p > 0.3) return 'expensive';
  return 'normal';
}
function getPremiumLabel(p) {
  if (p <= -0.5) return '買入機會';
  if (p >= 0.5) return '觀望';
  return '正常';
}

let sectorCharts = [];
function renderSectorCharts() {

  ETF_DATA.forEach((etf, i) => {

    const chart = new Chart(canvas, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, data.length), borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { enabled: false } }, cutout: '55%',
        onClick: (evt, elements) => {
          if (!elements.length) return;
          const idx = elements[0].index;
          const legendItems = canvas.closest('.sector-area').querySelectorAll('.sector-legend-item');
          legendItems.forEach((item, j) => {
            item.style.background = j === idx ? 'rgba(88,166,255,.15)' : ''; item.style.border = j === idx ? '1px dashed #58a6ff' : 'none'; item.style.padding = j === idx ? '2px 4px' : '';
            item.style.borderRadius = '4px';
          });
        }
      }
    });
    sectorCharts.push(chart);
  });
}

// === Watchlist Functions ===
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwJCvfKn3K1bQgYvU7T-2XujXZRPZzXr7lPQt_mCEeQbTjA0HRny_YL04yhsyLvl_9y/exec';
const WL_SHEET_ID = '1GT8LkzWJPo9psHwRIJwjfV2HEoYf7x8eIkI22BhuqIs';

function switchMainTab(tab) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.main-tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('view-etf').style.display = tab === 'etf' ? 'block' : 'none';
  document.getElementById('view-watchlist').style.display = tab === 'watchlist' ? 'block' : 'none';
  if (tab === 'watchlist') loadWatchlist();
}

async function loadWatchlist() {
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${WL_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=watchlist&t=${Date.now()}`);
    const csv = await res.text();
    const rows = csv.trim().split('\n').filter(r => r);
    const container = document.getElementById('watchlist-cards');
    const empty = document.getElementById('watchlist-empty');
    if (!rows.length || (rows.length === 1 && rows[0].match(/^"?",?/))) {
      container.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    container.innerHTML = rows.map(row => {
      const cols = row.match(/"([^"]*)"/g)?.map(s => s.replace(/"/g,'')) || row.split(',');
      const ticker = cols[0] || '';
      const name = cols[1] || '';
      const price = parseFloat(cols[3]) || 0;
      const change = parseFloat(cols[4]) || 0;
      const pct = parseFloat(cols[5]) || 0;
      const updated = cols[6] || '';
      if (!ticker) return '';
      return `<div class="wl-card">
        <button class="wl-delete" onclick="confirmDelete('${ticker}','${name}')">&times;</button>
        <div class="wl-top">
          <div>
            <div class="wl-ticker">${ticker}</div>
            <div class="wl-name">${name}</div>
          </div>
          <div style="text-align:right">
            <div class="wl-price">${price ? '$'+price.toFixed(2) : '--'}</div>
            <span class="wl-change ${pct>=0?'up':'down'}">${pct>=0?'+':''}${pct}%</span>
          </div>
        </div>
        ${updated ? '<div style="font-size:0.65rem;color:var(--muted);margin-top:6px">更新：'+updated+'</div>' : ''}
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('watchlist-cards').innerHTML = '<p style="color:var(--muted)">載入失敗</p>';
  }
}

function addStock() {
  const ticker = prompt('請輸入股票代號（如 2330）：');
  if (!ticker || !ticker.trim()) return;
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({action:'add', ticker: ticker.trim()})
  });
  alert('已新增 ' + ticker.trim() + '，報價將在下次更新時顯示。');
  setTimeout(() => loadWatchlist(), 3000);
}

let pendingDelete = null;
function confirmDelete(ticker, name) {
  pendingDelete = ticker;
  document.getElementById('confirm-overlay').style.display = 'flex';
  document.getElementById('confirm-msg').textContent = `確定要移除 ${ticker} ${name}？`;
}
function doDelete() {
  if (!pendingDelete) return;
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({action:'remove', ticker: pendingDelete})
  });
  pendingDelete = null;
  document.getElementById('confirm-overlay').style.display = 'none';
  setTimeout(() => loadWatchlist(), 2000);
}
function cancelDelete() {
  pendingDelete = null;
  document.getElementById('confirm-overlay').style.display = 'none';
}

// === Live Price Fetch (from Google Sheet, updated every 5 min by Apps Script) ===
const TICKERS_LIVE = ["0050","0056","00878","00919","00929","00940"];
const PRICE_SHEET_ID = "1GT8LkzWJPo9psHwRIJwjfV2HEoYf7x8eIkI22BhuqIs";

async function fetchLivePrices() {
  console.log('[ETF] Fetching live prices...');
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${PRICE_SHEET_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`);
    console.log('[ETF] Response status:', res.status);
    if (!res.ok) throw new Error('Sheet fetch failed: ' + res.status);
    const csv = await res.text();
    console.log('[ETF] CSV:', csv.substring(0, 100));
    const rows = csv.trim().split('\n').slice(1); // skip header
    let updated = 0;
    rows.forEach(row => {
      const cols = row.match(/"([^"]*)"/g)?.map(s => s.replace(/"/g,'')) || [];
      const ticker = cols[0];
      const price = parseFloat(cols[1]);
      const change = parseFloat(cols[2]);
      const changePct = parseFloat(cols[3]);
      const updateTime = cols[4] || '';
      const etf = ETF_DATA.find(e => e.ticker === ticker);
      if (etf && price > 0) {
        etf.price = price;
        etf.change = change;
        etf.changePercent = changePct;
        updated++;
      }
    });
    console.log('[ETF] Updated:', updated);
    if (updated > 0) {
      renderCards();
      renderSectorCharts();
      const statusEl = document.getElementById("live-status");
      const lastUpdate = rows[0]?.match(/"([^"]*)"/g)?.pop()?.replace(/"/g,'') || '';
      if (statusEl) statusEl.textContent = `✅ 即時報價（${updated}檔）更新：${lastUpdate}`;
    } else {
      throw new Error('No ETF matched');
    }
  } catch(e) {
    console.log('[ETF] Error:', e.message);
    const statusEl = document.getElementById("live-status");
    if (statusEl) statusEl.textContent = "⚠️ 即時報價載入失敗，顯示靜態資料";
  }
}
// Auto refresh every 60s during market hours (Mon-Fri 9:00-13:30)
function shouldFetch() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), day = now.getDay();
  return day >= 1 && day <= 5 && ((h === 9) || (h >= 10 && h <= 12) || (h === 13 && m <= 30));
}

// Always fetch once on page load, then auto-refresh during market hours
fetchLivePrices();
setInterval(() => { if(shouldFetch()) fetchLivePrices(); }, 300000);
