<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股 ETF 績效追蹤</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #131829;
  --surface2: #1a2035;
  --border: #2a3050;
  --text: #e8ecf4;
  --muted: #7a8599;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }

.header { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border-bottom:1px solid var(--border); padding:16px 20px; position:sticky; top:0; z-index:100; backdrop-filter:blur(10px); }
.header h1 { font-size:1.3rem; background:linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header .subtitle { font-size:0.8rem; color:var(--muted); margin-top:2px; }

.container { max-width:1200px; margin:0 auto; padding:16px; }

.cards { display:grid; grid-template-columns:1fr; gap:16px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; transition:transform .2s, box-shadow .2s; }
.card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,212,255,.08); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-left { display:flex; align-items:center; gap:8px; }
.card-ticker { font-size:1.7rem; font-weight:700; color:var(--accent); }
.card-name { font-size:0.9rem; color:var(--muted); }
.card-type { font-size:0.65rem; padding:2px 6px; border-radius:4px; background:var(--accent2); color:#fff; font-weight:500; white-space:nowrap; }
.card-right { text-align:right; }
.card-price { font-size:1.3rem; font-weight:700; }
.card-change { font-size:0.8rem; font-weight:600; padding:2px 6px; border-radius:5px; display:inline-block; margin-top:2px; }
.card-change.up { color:var(--red); background:rgba(239,68,68,.12); }
.card-change.down { color:var(--green); background:rgba(16,185,129,.12); }

.card-section { padding-top:10px; margin-top:10px; border-top:1px solid var(--border); }
.card-section-title { font-size:0.7rem; color:var(--muted); margin-bottom:6px; font-weight:600; }

.returns-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.return-item { text-align:center; }
.return-label { font-size:0.68rem; color:var(--muted); }
.return-value { font-size:0.85rem; font-weight:700; margin-top:2px; }
.return-value.positive { color:var(--red); }
.return-value.negative { color:var(--green); }

.dividend-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:8px; }
.div-item-label { font-size:0.68rem; color:var(--muted); }
.div-item-value { font-size:0.85rem; font-weight:700; margin-top:1px; }

.recent-div { display:flex; gap:6px; flex-wrap:wrap; }
.recent-div-item { font-size:0.7rem; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:3px 6px; }
.recent-div-item .rd-date { color:var(--muted); }
.recent-div-item .rd-amt { color:var(--yellow); font-weight:600; margin-left:4px; }

.sector-area { display:flex; align-items:center; gap:12px; }
.sector-chart { width:100px; height:100px; flex-shrink:0; }
.sector-legend { flex:1; }
.sector-legend-item { display:flex; align-items:center; gap:4px; font-size:0.7rem; margin-bottom:2px; }
.sector-legend-item .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sector-legend-item .sl-name { color:var(--muted); }
.sector-legend-item .sl-pct { margin-left:auto; font-weight:600; }

@media (min-width:768px) {
  .container { padding:24px; }
  .cards { grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:16px; }
  .header { padding:20px 32px; }
  .header h1 { font-size:1.6rem; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="header">
  <h1 style="cursor:pointer" onclick="location.reload()">📊 台股 ETF 績效追蹤</h1>
  <div class="subtitle">6 檔熱門 ETF 即時數據 · <span id="live-status">載入報價中...</span></div>
</div>

<div class="container">
  <div class="cards" id="etf-cards"></div>
</div>

<script>
const ETF_DATA = [
  {
    ticker: '0050', name: '元大台灣50', type: '市值型',
    price: 102.55, change: +2.45, changePercent: +2.45,
    returns: { m1: 8.2, m3: 12.5, m6: 18.7, y1: 35.2 },
    dividend: { annual: 3.5, yield: 3.41, frequency: '半年配', recent: [{date:'2026/01',amount:1.8},{date:'2025/07',amount:1.7},{date:'2025/01',amount:1.6},{date:'2024/07',amount:1.5}] },
    sectors: { '半導體':62, '金融保險':8, '電子零組件':7, '電腦及週邊':6, '通信網路':5, '其他':12 }
  },
  {
    ticker: '0056', name: '元大高股息', type: '高股息',
    price: 49.64, change: +1.32, changePercent: +2.73,
    returns: { m1: 5.8, m3: 9.2, m6: 14.1, y1: 22.6 },
    dividend: { annual: 2.8, yield: 5.64, frequency: '季配', recent: [{date:'2026/04',amount:0.70},{date:'2026/01',amount:0.72},{date:'2025/10',amount:0.68},{date:'2025/07',amount:0.70}] },
    sectors: { '半導體':35, '電子零組件':18, '金融保險':15, '電腦及週邊':10, '傳產':12, '其他':10 }
  },
  {
    ticker: '00878', name: '國泰永續高股息', type: '高股息/ESG',
    price: 30.55, change: +0.93, changePercent: +3.14,
    returns: { m1: 6.1, m3: 10.8, m6: 15.3, y1: 24.1 },
    dividend: { annual: 1.72, yield: 5.63, frequency: '季配', recent: [{date:'2026/05',amount:0.43},{date:'2026/02',amount:0.45},{date:'2025/11',amount:0.42},{date:'2025/08',amount:0.42}] },
    sectors: { '半導體':38, '金融保險':18, '電子零組件':14, '電腦及週邊':9, '通信網路':8, '其他':13 }
  },
  {
    ticker: '00919', name: '群益台灣精選高息', type: '高股息',
    price: 28.85, change: +0.92, changePercent: +3.29,
    returns: { m1: 7.5, m3: 13.2, m6: 19.8, y1: 28.5 },
    dividend: { annual: 2.16, yield: 7.49, frequency: '季配', recent: [{date:'2026/04',amount:0.55},{date:'2026/01',amount:0.54},{date:'2025/10',amount:0.55},{date:'2025/07',amount:0.52}] },
    sectors: { '半導體':42, '電子零組件':20, '電腦及週邊':12, '通信網路':8, '金融保險':7, '其他':11 }
  },
  {
    ticker: '00929', name: '復華台灣科技優息', type: '月配/科技',
    price: 30.04, change: +0.83, changePercent: +2.84,
    returns: { m1: 12.1, m3: 18.5, m6: 25.2, y1: 32.8 },
    dividend: { annual: 1.92, yield: 6.39, frequency: '月配', recent: [{date:'2026/05',amount:0.16},{date:'2026/04',amount:0.16},{date:'2026/03',amount:0.16},{date:'2026/02',amount:0.16}] },
    sectors: { '半導體':55, '電子零組件':15, '電腦及週邊':12, '通信網路':8, '光電':5, '其他':5 }
  },
  {
    ticker: '00940', name: '元大台灣價值高息', type: '高股息/價值',
    price: 11.87, change: +0.11, changePercent: +0.94,
    returns: { m1: 4.2, m3: 7.8, m6: 11.5, y1: 15.2 },
    dividend: { annual: 0.72, yield: 6.07, frequency: '季配', recent: [{date:'2026/04',amount:0.18},{date:'2026/01',amount:0.18},{date:'2025/10',amount:0.18},{date:'2025/07',amount:0.18}] },
    sectors: { '半導體':30, '金融保險':20, '電子零組件':16, '傳產':14, '電腦及週邊':10, '其他':10 }
  }
];

function renderCards() {
  const container = document.getElementById('etf-cards');
  container.innerHTML = ETF_DATA.map((etf, i) => `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-left">
            <span class="card-ticker">${etf.ticker}</span>
            <span class="card-type">${etf.type}</span>
          </div>
          <div class="card-name">${etf.name}</div>
        </div>
        <div class="card-right">
          <div class="card-price">$${etf.price.toFixed(2)}</div>
          <span class="card-change ${etf.changePercent>=0?'up':'down'}">${etf.changePercent>=0?'+':''}${etf.changePercent.toFixed(2)}%</span>
        </div>
      </div>
      <div class="card-section">
        <div class="card-section-title">累積報酬率</div>
        <div class="returns-row">
          ${[['1月','m1'],['3月','m3'],['6月','m6'],['1年','y1']].map(([label,key]) => `
            <div class="return-item">
              <div class="return-label">${label}</div>
              <div class="return-value ${etf.returns[key]>=0?'positive':'negative'}">${etf.returns[key]>=0?'+':''}${etf.returns[key]}%</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="card-section">
        <div class="card-section-title">配息資訊</div>
        <div class="dividend-row">
          <div><div class="div-item-label">殖利率</div><div class="div-item-value" style="color:var(--yellow)">${etf.dividend.yield}%</div></div>
          <div><div class="div-item-label">配息頻率</div><div class="div-item-value">${etf.dividend.frequency}</div></div>
          <div><div class="div-item-label">年配息</div><div class="div-item-value">$${etf.dividend.annual}</div></div>
        </div>
        <div class="recent-div">
          ${etf.dividend.recent.map(r => `<span class="recent-div-item"><span class="rd-date">${r.date}</span><span class="rd-amt">$${r.amount}</span></span>`).join('')}
        </div>
      </div>
      <div class="card-section">
        <div class="card-section-title">產業分布</div>
        <div class="sector-area">
          <div class="sector-chart"><canvas id="sector-${i}"></canvas></div>
          <div class="sector-legend">
            ${Object.entries(etf.sectors).map(([k,v],j) => {
              const colors = ['#00d4ff','#7c3aed','#10b981','#f59e0b','#ef4444','#6366f1','#ec4899','#14b8a6'];
              return `<div class="sector-legend-item"><span class="dot" style="background:${colors[j]}"></span><span class="sl-name">${k}</span><span class="sl-pct">${v}%</span></div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

let sectorCharts = [];
function renderSectorCharts() {
  const colors = ['#00d4ff','#7c3aed','#10b981','#f59e0b','#ef4444','#6366f1','#ec4899','#14b8a6'];
  sectorCharts.forEach(c => c.destroy());
  sectorCharts = [];
  ETF_DATA.forEach((etf, i) => {
    const canvas = document.getElementById(`sector-${i}`);
    if (!canvas) return;
    const labels = Object.keys(etf.sectors);
    const data = Object.values(etf.sectors);
    const chart = new Chart(canvas, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, data.length), borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { enabled: false } }, cutout: '55%',
        onClick: (evt, elements) => {
          if (!elements.length) return;
          const idx = elements[0].index;
          const legendItems = canvas.closest('.sector-area').querySelectorAll('.sector-legend-item');
          legendItems.forEach((item, j) => {
            item.style.background = j === idx ? 'rgba(88,166,255,.15)' : ''; item.style.border = j === idx ? '1px dashed #58a6ff' : 'none'; item.style.padding = j === idx ? '2px 4px' : '';
            item.style.borderRadius = '4px';
          });
        }
      }
    });
    sectorCharts.push(chart);
  });
}

// Init
renderCards();
renderSectorCharts();

// === Live Price Fetch (from Google Sheet, updated every 5 min by Apps Script) ===
const TICKERS_LIVE = ["0050","0056","00878","00919","00929","00940"];
const PRICE_SHEET_ID = "1GT8LkzWJPo9psHwRIJwjfV2HEoYf7x8eIkI22BhuqIs";

async function fetchLivePrices() {
  console.log('[ETF] Fetching live prices...');
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${PRICE_SHEET_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`);
    console.log('[ETF] Response status:', res.status);
    if (!res.ok) throw new Error('Sheet fetch failed: ' + res.status);
    const csv = await res.text();
    console.log('[ETF] CSV:', csv.substring(0, 100));
    const rows = csv.trim().split('\n').slice(1); // skip header
    let updated = 0;
    rows.forEach(row => {
      const cols = row.match(/"([^"]*)"/g)?.map(s => s.replace(/"/g,'')) || [];
      const ticker = cols[0];
      const price = parseFloat(cols[1]);
      const change = parseFloat(cols[2]);
      const changePct = parseFloat(cols[3]);
      const updateTime = cols[4] || '';
      const etf = ETF_DATA.find(e => e.ticker === ticker);
      if (etf && price > 0) {
        etf.price = price;
        etf.change = change;
        etf.changePercent = changePct;
        updated++;
      }
    });
    console.log('[ETF] Updated:', updated);
    if (updated > 0) {
      renderCards();
      renderSectorCharts();
      const statusEl = document.getElementById("live-status");
      const lastUpdate = rows[0]?.match(/"([^"]*)"/g)?.pop()?.replace(/"/g,'') || '';
      if (statusEl) statusEl.textContent = `✅ 即時報價（${updated}檔）更新：${lastUpdate}`;
    } else {
      throw new Error('No ETF matched');
    }
  } catch(e) {
    console.log('[ETF] Error:', e.message);
    const statusEl = document.getElementById("live-status");
    if (statusEl) statusEl.textContent = "⚠️ 即時報價載入失敗，顯示靜態資料";
  }
}
// Auto refresh every 60s during market hours (Mon-Fri 9:00-13:30)
function shouldFetch() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), day = now.getDay();
  return day >= 1 && day <= 5 && ((h === 9) || (h >= 10 && h <= 12) || (h === 13 && m <= 30));
}

// Always fetch once on page load, then auto-refresh during market hours
fetchLivePrices();
setInterval(() => { if(shouldFetch()) fetchLivePrices(); }, 300000);
</script>
<script src="nav.js"></script>
</body>
</html>
