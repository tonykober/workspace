<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股 ETF 績效追蹤</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #131829;
  --surface2: #1a2035;
  --border: #2a3050;
  --text: #e8ecf4;
  --muted: #7a8599;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }

.header { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border-bottom:1px solid var(--border); padding:16px 20px; position:sticky; top:0; z-index:100; backdrop-filter:blur(10px); }
.header h1 { font-size:clamp(0.9rem, 4vw, 1.3rem); background:linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header .subtitle { font-size:0.9rem; color:var(--muted); margin-top:2px; }

.container { max-width:1200px; margin:0 auto; padding:16px; }

.cards { display:grid; grid-template-columns:1fr; gap:16px; padding-top:12px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; min-width:0; transition:transform .2s, box-shadow .2s; }
.card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,212,255,.08); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-left { display:flex; align-items:center; gap:8px; }
.card-ticker { font-size:1.7rem; font-weight:700; color:var(--accent); }
.card-name { font-size:0.9rem; color:var(--muted); }
.card-type { font-size:0.9rem; padding:2px 6px; border-radius:4px; background:var(--accent2); color:#fff; font-weight:500; white-space:nowrap; }
.card-right { text-align:right; }
.card-price { font-size:1.4rem; font-weight:700; }
.card-change { font-size:0.9rem; font-weight:600; padding:2px 6px; border-radius:5px; display:inline-block; margin-top:2px; }
.card-change.up { color:var(--red); background:rgba(239,68,68,.12); }
.card-change.down { color:var(--green); background:rgba(16,185,129,.12); }

.fund-info-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(60px, 1fr)); gap:6px; margin-top:10px; padding-top:10px; border-top:2px solid var(--border); }
.fund-info-row .fi-item { text-align:center; position:relative; }
.fund-info-row .fi-label { font-size:0.9rem; color:var(--muted); }
.fund-info-row .fi-value { font-size:0.9rem; font-weight:700; margin-top:1px; white-space:nowrap; }
.premium-value.cheap { color:var(--green); }
.premium-value.expensive { color:var(--red); }
.premium-value.normal { color:var(--muted); }
.sug-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.9rem; font-weight:600; }
.sug-buy { background:rgba(16,185,129,.15); color:#10b981; }
.sug-hold { background:rgba(88,166,255,.15); color:#58a6ff; }
.sug-wait { background:rgba(234,179,8,.15); color:#eab308; }
.sug-sell { background:rgba(239,68,68,.15); color:#ef4444; }
.dividend-inline { font-size:0.9rem; color:var(--text); margin-bottom:8px; }

.card-section { padding-top:10px; margin-top:10px; border-top:2px solid var(--border); }
.card-section-title { font-size:0.9rem; color:var(--muted); margin-bottom:6px; font-weight:600; }

.holdings-toggle { cursor:pointer; user-select:none; }
.holdings-toggle::after { content:' ▼'; display:inline; font-size:0.9rem; transition:transform .3s; }
.card-section.open .holdings-toggle::after { content:' ▲'; }
.holdings-content { max-height:0; overflow:hidden; transition:max-height .3s ease; }
.card-section.open .holdings-content { max-height:400px; }
.holding-bar { display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:0.9rem; }
.holding-bar .hb-name { width:50px; text-align:right; color:var(--muted); flex-shrink:0; }
.holding-bar .hb-track { flex:1; height:18px; background:var(--surface2); border-radius:3px; overflow:hidden; position:relative; }
.holding-bar .hb-fill { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:3px; }
.holding-bar .hb-pct { position:absolute; right:4px; top:50%; transform:translateY(-50%); font-weight:600; font-size:0.9rem; color:var(--text); text-shadow:0 0 3px var(--bg); }

.returns-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.return-item { text-align:center; }
.return-label { font-size:0.9rem; color:var(--muted); }
.return-value { font-size:0.9rem; font-weight:700; margin-top:2px; }
.return-value.positive { color:var(--red); }
.return-value.negative { color:var(--green); }

.dividend-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:8px; }
.div-item-label { font-size:0.9rem; color:var(--muted); }
.div-item-value { font-size:0.9rem; font-weight:700; margin-top:1px; }

.recent-div { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.recent-div-item { font-size:0.9rem; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:3px 6px;  }
.recent-div-item .rd-date { color:var(--muted); }
.recent-div-item .rd-amt { color:var(--yellow); font-weight:600; margin-left:4px; }

.sector-area { display:flex; align-items:center; gap:12px; }
.sector-chart { width:100px; height:100px; flex-shrink:0; }
.sector-legend { flex:1; }
.sector-legend-item { display:flex; align-items:center; gap:4px; font-size:0.9rem; margin-bottom:2px; }
.sector-legend-item .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sector-legend-item .sl-name { color:var(--muted); }
.sector-legend-item .sl-pct { margin-left:auto; font-weight:600; }

@media (min-width:768px) {
  .container { padding:24px; }
  .cards { grid-template-columns:repeat(3, 1fr); gap:16px; }
  .header { padding:20px 32px; }
  .header h1 { font-size:1.6rem; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.sparkline-wrap { margin-top:8px; height:40px; border:1px solid var(--border); border-radius:6px; padding:4px; }
.sparkline-wrap canvas { width:100% !important; }

.compare-btn { position:absolute; top:-8px; left:-8px; background:var(--accent); border:none; color:#000; font-size:0.75rem; padding:4px 8px; border-radius:12px; cursor:pointer; z-index:2; font-weight:600; }
.compare-btn:hover { opacity:0.8; }
.compare-btn.active { background:var(--green); color:#000; }
.card.comparing { border-color:var(--accent); box-shadow:0 0 8px rgba(88,166,255,.3); }
.compare-panel { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:2px solid var(--accent); max-height:60vh; overflow-y:auto; padding:16px; z-index:200; display:none; }
.compare-panel.show { display:block; }
.compare-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.compare-header h3 { color:var(--accent); font-size:1rem; }
.compare-close { background:none; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; }
.compare-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:12px; }
.compare-section { margin-bottom:16px; }
.compare-section h4 { color:var(--purple); font-size:0.9rem; margin-bottom:8px; }
.compare-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:0.85rem; }
.compare-bar-label { width:50px; color:var(--muted); text-align:right; flex-shrink:0; }
.compare-bar-track { flex:1; height:16px; background:var(--surface2); border-radius:3px; overflow:hidden; display:flex; }
.compare-bar-fill { height:100%; border-radius:3px; }
.compare-bar-val { width:50px; font-weight:600; flex-shrink:0; }
.compare-overlap { font-size:0.85rem; }
.compare-overlap li { margin-bottom:4px; color:var(--muted); }
@media(max-width:768px) { .compare-panel { max-height:80vh; } }

.main-tabs { display:flex; gap:4px; }
.main-tab { padding:4px 10px; border-radius:20px; font-size:clamp(0.9rem, 2.5vw, 0.85rem); white-space:nowrap; cursor:pointer; color:var(--muted); border:1px solid var(--border); transition:all .2s; }
.main-tab.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
.add-btn { background:var(--accent); color:#000; border:none; padding:6px 14px; border-radius:6px; font-size:0.9rem; font-weight:600; cursor:pointer; }
.add-btn:hover { opacity:0.8; }
.wl-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; position:relative; }
.wl-card .wl-top { display:flex; justify-content:space-between; align-items:flex-start; }
.wl-card .wl-ticker { font-size:1.4rem; font-weight:700; color:var(--accent); }
.wl-card .wl-name { font-size:0.9rem; color:var(--muted); }
.wl-card .wl-price { font-size:1.2rem; font-weight:700; }
.wl-card .wl-change { font-size:0.9rem; padding:2px 8px; border-radius:4px; }
.wl-card .wl-change.up { color:var(--red); background:rgba(239,68,68,.12); }
.wl-card .wl-change.down { color:var(--green); background:rgba(16,185,129,.12); }
.wl-delete { position:absolute; top:-8px; right:-8px; background:var(--red); border:none; color:#fff; font-size:0.9rem; cursor:pointer; padding:4px 8px; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
.wl-delete:hover { opacity:0.8; }
.confirm-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:999; }
.confirm-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; max-width:300px; text-align:center; }
.confirm-box p { margin-bottom:16px; color:var(--text); }
.confirm-box .btns { display:flex; gap:10px; justify-content:center; }
.confirm-box button { padding:8px 20px; border-radius:6px; border:none; cursor:pointer; font-size:14px; }
.confirm-box .btn-yes { background:var(--red); color:#fff; }
.confirm-box .btn-no { background:var(--border); color:var(--text); }

.chart-modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.85); z-index:300; display:none; align-items:center; justify-content:center; padding:16px; }
.chart-modal.show { display:flex; }
.chart-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; width:100%; max-width:800px; max-height:90vh; overflow-y:auto; }
.chart-box h3 { color:var(--accent); margin-bottom:4px; font-size:1rem; }
.chart-box .chart-info { display:flex; gap:16px; font-size:0.85rem; color:var(--muted); margin-bottom:12px; flex-wrap:wrap; }
.chart-box .chart-info span b { color:var(--text); }
.chart-box canvas { width:100% !important; height:250px !important; }
.chart-box .chart-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.chart-box .chart-actions button { background:var(--surface2); border:1px solid var(--border); color:var(--muted); padding:4px 10px; border-radius:4px; font-size:0.8rem; cursor:pointer; }
.chart-box .chart-actions button:hover { border-color:var(--accent); color:var(--accent); }
.chart-box .chart-actions button.active { background:var(--accent); color:#000; border-color:var(--accent); }
.chart-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; }
.div-cal-btn { background:var(--surface2); border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:6px; font-size:0.85rem; cursor:pointer; margin-left:8px; }
.div-cal-btn:hover { border-color:var(--accent); color:var(--accent); }
.cal-modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.85); z-index:300; display:none; align-items:center; justify-content:center; padding:16px; overflow-y:auto; }
.cal-modal.show { display:flex; }
.cal-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; width:100%; max-width:900px; max-height:90vh; overflow-y:auto; position:relative; }
.cal-box h3 { color:var(--accent); margin-bottom:12px; }
.cal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; }
.cal-timeline { display:grid; grid-template-columns:repeat(12, 1fr); gap:4px; }
.cal-month { background:var(--surface2); border-radius:6px; padding:8px 4px; min-height:80px; }
.cal-month-label { font-size:0.75rem; color:var(--muted); text-align:center; margin-bottom:6px; font-weight:600; }
.cal-item { font-size:0.7rem; padding:2px 4px; border-radius:3px; margin-bottom:3px; text-align:center; }
.cal-empty { color:var(--muted); font-size:0.7rem; text-align:center; font-style:italic; }
.cal-summary { margin-top:16px; padding-top:12px; border-top:1px solid var(--border); }
.cal-summary h4 { color:var(--purple); font-size:0.9rem; margin-bottom:8px; }
.cal-summary-grid { display:grid; grid-template-columns:repeat(12, 1fr); gap:4px; text-align:center; font-size:0.8rem; }
.cal-summary-item { padding:6px 2px; border-radius:4px; }
.cal-summary-item.has { background:rgba(59,185,80,.1); color:var(--green); }
.cal-summary-item.empty { background:rgba(248,81,73,.1); color:var(--red); }
@media(max-width:768px) { .cal-timeline { grid-template-columns:repeat(4, 1fr); } .cal-summary-grid { grid-template-columns:repeat(4, 1fr); } }
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
.filter-bar .label { font-size:0.8rem; color:var(--muted); margin-right:4px; }
.pill { padding:4px 10px; border-radius:16px; font-size:0.8rem; cursor:pointer; border:1px solid var(--border); color:var(--muted); background:transparent; transition:all .2s; }
.pill:hover { border-color:var(--accent); color:var(--accent); }
.pill.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
.update-info { font-size:0.8rem; color:var(--muted); margin-top:2px; }
.update-info span { margin-right:12px; }
.card-mid { display:flex; gap:12px; margin:10px 0; align-items:stretch; }
.card-mid-left { flex:1; cursor:pointer; border:1px solid var(--border); border-radius:6px; padding:4px; }
.card-mid-left canvas { width:100% !important; height:35px !important; }
.card-mid-right { flex:1; display:flex; flex-direction:column; justify-content:center; gap:4px; font-size:0.9rem; }
.card-mid-right .kpi { display:flex; justify-content:space-between; align-items:center; }
.card-mid-right .kpi-label { color:var(--muted); }
.card-mid-right .kpi-value { font-weight:600; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap">
    <h1><span style="cursor:pointer" onclick="fetchLivePrices();loadWatchlist();renderCards();renderSectorCharts();renderSparklines()">📊 台股 ETF 績效追蹤</span></h1>
    <div class="main-tabs">
      <div class="main-tab active" onclick="switchMainTab('etf')">ETF 追蹤</div>
      <div class="main-tab" onclick="switchMainTab('watchlist')">自選個股</div>
    </div>
    <button class="div-cal-btn" onclick="showDivCalendar()">📅 配息日曆</button>
  </div>
  <div class="subtitle">即時數據 · <span id="live-status">載入報價中...</span></div>
  <div class="update-info"><span id="price-time"></span><span>NAV/報酬率：每日 16:00 更新</span></div>
</div>

<div class="container">
<div id="view-etf">
  <div class="filter-bar">
    <span class="label">排序：</span>
    <button class="pill" onclick="sortETF('yield')">殖利率</button>
    <button class="pill" onclick="sortETF('ret1m')">1月報酬</button>
    <button class="pill" onclick="sortETF('premium')">折溢價</button>
    <span class="label" style="margin-left:8px">篩選：</span>
    <button class="pill active" onclick="filterETF('all')" id="f-all">全部</button>
    <button class="pill" onclick="filterETF('月配')" id="f-月配">月配</button>
    <button class="pill" onclick="filterETF('季配')" id="f-季配">季配</button>
    <button class="pill" onclick="filterETF('半年配')" id="f-半年配">半年配</button>
  </div>
  <div class="cards" id="etf-cards"></div>
</div>
<div id="view-watchlist" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="font-size:1rem;color:var(--accent)">自選追蹤清單</h3>
    <button class="add-btn" onclick="addStock()">+ 新增</button>
  </div>
  <div class="cards" id="watchlist-cards"></div>
  <div id="watchlist-empty" style="text-align:center;color:var(--muted);padding:40px">尚無追蹤個股，點擊「+ 新增」開始</div>
</div>
</div>

<script>
let ETF_DATA = [];

function getPremiumClass(p) {
  if (p < -0.3) return 'cheap';
  if (p > 0.3) return 'expensive';
  return 'normal';
}
function getSuggestion(etf) {
  const q = etf.quarterLine || 0;
  const p = etf.premium || 0;
  let text, cls, reason;
  if (q < -8 && p <= 0) { text='買進'; cls='sug-buy'; reason='離季線'+q+'% 超跌+折價'; }
  else if (q < -8) { text='觀望'; cls='sug-wait'; reason='離季線'+q+'% 超跌但溢價'; }
  else if (q <= 10 && p < -0.3) { text='加碼'; cls='sug-buy'; reason='正常範圍+折價'+p+'%'; }
  else if (q <= 10) { text='持有'; cls='sug-hold'; reason='離季線'+q+'% 正常範圍'; }
  else if (q <= 15) { text='觀望'; cls='sug-wait'; reason='離季線'+q+'% 偏高'; }
  else { text='減碼'; cls='sug-sell'; reason='離季線'+q+'% 過熱'; }
  return {text, cls, reason};
}

function renderCards() {
  const container = document.getElementById('etf-cards');
  container.innerHTML = ETF_DATA.map((etf, i) => `<div class="card" style="position:relative;${currentFilter !== 'all' && etf.dividend && etf.dividend.frequency !== currentFilter ? 'display:none' : ''}">
  <button class="compare-btn" onclick="toggleCompare(${i})">比較</button>
  <div class="card-top">
    <div>
      <div class="card-left"><span class="card-ticker">${etf.ticker}</span><span class="card-type">${etf.type}</span></div>
      <div class="card-name">${etf.name}</div>
    </div>
    <div class="card-right">
      <div class="card-price">${etf.price ? '$'+etf.price.toFixed(2) : '--'}</div>
      <span class="card-change ${etf.changePercent>=0?'up':'down'}">${etf.change>=0?'+':''}${etf.change} (${etf.changePercent>=0?'+':''}${etf.changePercent.toFixed(2)}%)</span>
    </div>
  </div>
  <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
    <div style="font-size:0.85rem;color:var(--muted);margin-bottom:6px">基金規模 <b style="color:var(--text)">${etf.fundSize}億</b> ｜ 受益人 <b style="color:var(--text)">${etf.holders}萬人</b></div>
    <div class="card-mid">
      <div class="card-mid-left" onclick="showChart(${i})"><canvas id="spark-etf-${i}" height="35"></canvas></div>
      <div class="card-mid-right">
        <div class="kpi"><span class="kpi-label">折溢價</span><span class="kpi-value premium-value ${getPremiumClass(etf.premium)}">${etf.premium}%</span></div>
        <div class="kpi"><span class="kpi-label">離季線</span><span class="kpi-value">${etf.quarterLine != null ? (etf.quarterLine>=0?'+':'')+etf.quarterLine+'%' : '--'}</span></div>
        <div class="kpi"><span class="kpi-label">建議 <span class="sug-badge ${getSuggestion(etf).cls}">${getSuggestion(etf).text}</span></span><span class="kpi-value" style="font-size:0.75rem;color:var(--muted);font-weight:400">${getSuggestion(etf).reason}</span></div>
      </div>
    </div>
  </div>
  <div class="card-section" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
    <div class="card-section-title">累積報酬率</div>
    <div class="returns-row">
      ${[['1月','m1'],['3月','m3'],['6月','m6'],['1年','y1']].map(([label,key]) => '<div class="return-item"><div class="return-label">'+label+'</div><div class="return-value '+(etf.returns[key]>=0?'positive':'negative')+'">'+(etf.returns[key]>=0?'+':'')+etf.returns[key]+'%</div></div>').join('')}
    </div>
  </div>
  <div class="card-section" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">

// === Dividend Calendar ===
const DIV_COLORS = ['#58a6ff','#f0883e','#3fb950','#a371f7','#d29922','#f85149','#ec4899','#14b8a6','#6366f1','#00d4ff'];

function showDivCalendar() {
  const now = new Date();
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth() + 1, label: (d.getMonth()+1) + '月', items: [] });
  }
  
  ETF_DATA.forEach((etf, ei) => {
    (etf.dividend.recent || []).forEach(r => {
      const parts = r.date.split('/');
      const y = parseInt(parts[0]), m = parseInt(parts[1]);
      const mo = months.find(x => x.year === y && x.month === m);
      if (mo) mo.items.push({ ticker: etf.ticker, amount: r.amount, color: DIV_COLORS[ei % DIV_COLORS.length] });
    });
  });
  
  let html = '<div class="cal-timeline">';
  months.forEach(mo => {
    html += '<div class="cal-month"><div class="cal-month-label">' + mo.label + '</div>';
    if (mo.items.length) {
      mo.items.forEach(item => {
        html += '<div class="cal-item" style="background:' + item.color + '22;color:' + item.color + ';border:1px solid ' + item.color + '44">' + item.ticker + '<br>$' + item.amount + '</div>';
      });
    } else {
      html += '<div class="cal-empty">無</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  
  html += '<div class="cal-summary"><h4>💰 月月配組合建議（假設各持有 1 張）</h4>';
  html += '<div class="cal-summary-grid">';
  months.forEach(mo => {
    const total = mo.items.reduce((s, i) => s + i.amount, 0);
    const hasDiv = total > 0;
    html += '<div class="cal-summary-item ' + (hasDiv ? 'has' : 'empty') + '">';
    html += '<div style="font-size:0.7rem">' + mo.label + '</div>';
    html += '<div style="font-weight:700">' + (hasDiv ? '$' + total.toFixed(2) : '—') + '</div>';
    html += '</div>';
  });
  html += '</div>';
  
  const gaps = months.filter(m => m.items.length === 0).map(m => m.label);
  if (gaps.length) {
    html += '<p style="margin-top:8px;font-size:0.85rem;color:var(--red)">⚠️ 未覆蓋月份：' + gaps.join('、') + '</p>';
  } else {
    html += '<p style="margin-top:8px;font-size:0.85rem;color:var(--green)">✅ 每月都有配息覆蓋！</p>';
  }
  html += '</div>';
  
  document.getElementById('cal-content').innerHTML = html;
  document.getElementById('cal-modal').classList.add('show');
}

function closeDivCalendar() {
  document.getElementById('cal-modal').classList.remove('show');
}

// === Historical Chart ===
let mainChart = null;
let chartOverlays = [];

function showChart(idx) {
  const etf = ETF_DATA[idx];
  if (!etf.sparkline || etf.sparkline.length < 2) return;
  const data = etf.sparkline;
  const high = Math.max(...data);
  const low = Math.min(...data);
  const start = data[0];
  const latest = data[data.length-1];
  
  document.getElementById('chart-title').textContent = etf.ticker + ' ' + etf.name + ' — 近一個月走勢';
  document.getElementById('chart-info').innerHTML = 
    '<span>起始 <b>$'+start.toFixed(2)+'</b></span>' +
    '<span>最高 <b style="color:var(--red)">$'+high.toFixed(2)+'</b></span>' +
    '<span>最低 <b style="color:var(--green)">$'+low.toFixed(2)+'</b></span>' +
    '<span>最新 <b>$'+latest.toFixed(2)+'</b></span>';
  
  // Actions: overlay buttons for other ETFs
  chartOverlays = [idx];
  const actionsHtml = ETF_DATA.map((e, i) => {
    if (i === idx) return '';
    return '<button onclick="toggleOverlay('+i+')" id="overlay-btn-'+i+'">'+e.ticker+'</button>';
  }).join('');
  document.getElementById('chart-actions').innerHTML = '<span style="font-size:0.8rem;color:var(--muted)">疊加比較：</span>' + actionsHtml;
  
  renderMainChart();
  document.getElementById('chart-modal').classList.add('show');
}

function closeChart() {
  document.getElementById('chart-modal').classList.remove('show');
  if (mainChart) { mainChart.destroy(); mainChart = null; }
}

function toggleOverlay(idx) {
  const i = chartOverlays.indexOf(idx);
  if (i >= 0) chartOverlays.splice(i, 1);
  else chartOverlays.push(idx);
  const btn = document.getElementById('overlay-btn-'+idx);
  if (btn) { btn.classList.toggle('active'); updateOverlayBtnColors(); }
  renderMainChart();
}

function updateOverlayBtnColors() {
  const colors = ["#00d4ff","#ff6b6b","#3fb950","#ffd93d","#a371f7","#ff8b94","#00c9a7","#f0883e","#6366f1","#ec4899"];
  chartOverlays.forEach((idx, ci) => {
    const btn = document.getElementById("overlay-btn-"+idx);
    if (btn) { btn.style.background = colors[ci % colors.length]; btn.style.color = "#000"; btn.style.borderColor = colors[ci % colors.length]; }
  });
  ETF_DATA.forEach((_, i) => {
    if (!chartOverlays.includes(i)) { const btn = document.getElementById("overlay-btn-"+i); if (btn) { btn.style.background = ""; btn.style.color = ""; btn.style.borderColor = ""; } }
  });
}

function renderMainChart() {
  const canvas = document.getElementById('chart-main');
  if (mainChart) mainChart.destroy();
  
  const colors = ["#00d4ff","#ff6b6b","#3fb950","#ffd93d","#a371f7","#ff8b94","#00c9a7","#f0883e","#6366f1","#ec4899"];
  const datasets = chartOverlays.map((idx, ci) => {
    const etf = ETF_DATA[idx];
    const data = etf.sparkline || [];
    // Normalize to % change from first day
    const base = data[0] || 1;
    const normalized = data.map(v => ((v - base) / base * 100).toFixed(2));
    return {
      label: etf.ticker,
      data: chartOverlays.length > 1 ? normalized : data,
      borderColor: colors[ci % colors.length],
      backgroundColor: colors[ci % colors.length] + '20',
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 4,
      fill: chartOverlays.length === 1,
      tension: 0.3
    };
  });
  
  mainChart = new Chart(canvas, {
    type: 'line',
    data: { labels: datasets[0].data.map((_, i) => 'D'+(i+1)), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false, animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: true, callbacks: { label: ctx => ctx.dataset.label + ': ' + (chartOverlays.length > 1 ? ctx.parsed.y + '%' : '$' + ctx.parsed.y) } }
      },
      scales: {
        x: { display: true, grid: { color: '#30363d' }, ticks: { color: '#8b949e', font: { size: 10 } } },
        y: { display: true, grid: { color: '#30363d' }, ticks: { color: '#8b949e', font: { size: 10 }, callback: v => chartOverlays.length > 1 ? v+'%' : '$'+v } }
      }
    }
  });
}

const SHEET_BASE = 'https://docs.google.com/spreadsheets/d/1GT8LkzWJPo9psHwRIJwjfV2HEoYf7x8eIkI22BhuqIs/gviz/tq?tqx=out:csv&sheet=';

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].match(/"([^"]*)"/g)?.map(s=>s.replace(/"/g,'')) || lines[0].split(',');
  return lines.slice(1).map(line => {
    const cols = line.match(/"([^"]*)"/g)?.map(s=>s.replace(/"/g,'')) || line.split(',');
    const obj = {};
    headers.forEach((h,i) => obj[h] = cols[i] || '');
    return obj;
  });
}

async function loadAllData() {
  const t = Date.now();
  try {
    const [infoRes, priceRes, secRes, holdRes, navRes] = await Promise.all([
      fetch(SHEET_BASE + 'info&t=' + t),
      fetch(SHEET_BASE + 'Sheet1&t=' + t),
      fetch(SHEET_BASE + 'sectors&t=' + t),
      fetch(SHEET_BASE + 'holdings&t=' + t),
      fetch(SHEET_BASE + 'nav_data&t=' + t)
    ]);
    const [infoCsv, priceCsv, secCsv, holdCsv, navCsv] = await Promise.all([
      infoRes.text(), priceRes.text(), secRes.text(), holdRes.text(), navRes.text()
    ]);
    
    const infoData = parseCSV(infoCsv);
    const priceData = parseCSV(priceCsv);
    const secData = parseCSV(secCsv);
    const holdData = parseCSV(holdCsv);
    const navData = parseCSV(navCsv);
    
    // Build ETF_DATA from info as base
    ETF_DATA = infoData.map(info => {
      const ticker = info.ticker;
      const price = priceData.find(p => p.ticker === ticker) || {};
      const sec = secData.find(s => s.ticker === ticker) || {};
      const hold = holdData.find(h => h.ticker === ticker) || {};
      const navRow = navData.find(n => n.ticker === ticker || ticker.endsWith(n.ticker) || n.ticker === ticker.replace(/^0+/,'')) || {};
      
      // Parse sectors
      const sectors = {};
      for (let i = 1; i <= 6; i++) {
        if (sec['s'+i] && sec['p'+i]) sectors[sec['s'+i]] = parseFloat(sec['p'+i]) || 0;
      }
      
      // Parse holdings
      const topHoldings = [];
      for (let i = 1; i <= 10; i++) {
        if (hold['h'+i] && hold['p'+i]) topHoldings.push({name: hold['h'+i], pct: parseFloat(hold['p'+i]) || 0});
      }
      
      // Parse sparkline
      const sparkRaw = price.sparkline || '';
      const sparkline = sparkRaw ? sparkRaw.split('|').map(Number).filter(n=>n>0) : [];
      
      // Parse dividend recent
      const divRecentRaw = navRow.divRecent || '';
      const recent = divRecentRaw ? divRecentRaw.split('|').map(s => { const p=s.split(':'); return {date:p[0],amount:parseFloat(p[1])||0}; }) : [];
      
      return {
        ticker,
        name: info.name || '',
        type: info.type || '',
        sparkline,
        price: parseFloat(price.price) || 0,
        change: parseFloat(price.change) || 0,
        changePercent: parseFloat(price.changePct) || 0,
        returns: {
          m1: parseFloat(navRow.ret1m) || 0,
          m3: parseFloat(navRow.ret3m) || 0,
          m6: parseFloat(navRow.ret6m) || 0,
          y1: parseFloat(navRow.ret1y) || 0
        },
        dividend: {
          annual: recent.slice(0,4).reduce((s,r)=>s+r.amount, 0),
          yield: parseFloat(navRow.divYield) || 0,
          frequency: info.frequency || '',
          recent: recent.length ? recent : [{date:'--',amount:0}]
        },
        sectors,
        fundSize: parseFloat(info.fundSize) || 0,
        holders: parseFloat(info.holders) || 0,
        nav: parseFloat(navRow.nav) || 0,
        premium: parseFloat(navRow.premium) || 0,
        quarterLine: parseFloat(price.quarterLine) || null,
        topHoldings
      };
    });
    
    document.getElementById('live-status').textContent = '\u2705 \u8cc7\u6599\u8f09\u5165\u5b8c\u6210 ' + new Date().toLocaleTimeString('zh-TW');
    const priceTime = priceData[0]?.updated || '';
    const ptEl = document.getElementById('price-time');
    if (ptEl) ptEl.textContent = '股價：' + priceTime + ' 更新 · ';
  } catch(e) {
    console.error('loadAllData error:', e);
    document.getElementById('live-status').textContent = '\u26a0\ufe0f \u8cc7\u6599\u8f09\u5165\u5931\u6557';
  }
}

      const name = cols[1] || '';

      const change = parseFloat(cols[4]) || 0;

      const updated = cols[6] || '';
      const pe = cols[7] || '';
      const sector = cols[8] || '';
      const divYield = cols[9] || '';

      const wlSpark = cols[11] ? cols[11].split('|').map(Number).filter(n=>n>0) : [];

        if (q === null) return {text:'--', cls:'sug-hold'};
        if (q < -8) return {text:'買進', cls:'sug-buy'};
        if (q > 15) return {text:'減碼', cls:'sug-sell'};
        if (q > 10) return {text:'觀望', cls:'sug-wait'};
        return {text:'持有', cls:'sug-hold'};
      })();
      if (!ticker) return '';
      return `<div class="card" style="position:relative">
  <button class="wl-delete" onclick="confirmDelete('${ticker}','${name}')">&times;</button>
  <div class="card-top">
    <div>
      <div class="card-left">
        <span class="card-ticker">${ticker}</span>
        ${sector ? '<span class="card-type">'+sector+'</span>' : ''}
      </div>
      <div class="card-name">${name}</div>
    </div>
    <div class="card-right">
      <div class="card-price">${price ? '$'+price.toFixed(2) : '--'}</div>
      <span class="card-change ${pct>=0?'up':'down'}">${pct>=0?'+':''}${change} (${pct>=0?'+':''}${pct}%)</span>
    </div>
  </div>
  <div class="fund-info-row" style="grid-template-columns:1fr 1fr">
    <div class="fi-item"><div class="fi-label">離季線</div><div class="fi-value">${quarterLine!==null?(quarterLine>=0?'+':'')+quarterLine+'%':'--'}</div></div>
    <div class="fi-item"><div class="fi-label">建議</div><div class="fi-value"><span class="sug-badge ${wlSug.cls}">${wlSug.text}</span></div></div>
  </div>
  <div class="sparkline-wrap"><canvas id="spark-wl-${i}" height="40" data-spark="${wlSpark.join('|')}"></canvas></div>
</div>`;
    }).join('');
    // Render watchlist sparklines
    document.querySelectorAll('[id^="spark-wl-"]').forEach(canvas => {
      const raw = canvas.dataset.spark;
      if (!raw) return;
      const data = raw.split('|').map(Number).filter(n=>n>0);
      if (data.length < 2) return;
      const isUp = data[data.length-1] >= data[0];
      const changes = data.slice(1).map((v,j) => v - data[j]);
      const colors = changes.map(c => c >= 0 ? '#ef4444' : '#10b981');
      new Chart(canvas, {
        type:'bar',
        data:{labels:data.map(()=>''),datasets:[{data:changes,backgroundColor:colors,borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}
      });
    });
  } catch(e) {
    document.getElementById('watchlist-cards').innerHTML = '<p style="color:var(--muted)">載入失敗</p>';
  }
}

function addStock() {
  const ticker = prompt('請輸入股票代號（如 2330）：');
  if (!ticker || !ticker.trim()) return;
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({action:'add', ticker: ticker.trim()})
  });
  alert('已新增 ' + ticker.trim() + '，報價將在下次更新時顯示。');
  setTimeout(() => loadWatchlist(), 3000);
}

let pendingDelete = null;
function confirmDelete(ticker, name) {
  pendingDelete = ticker;
  document.getElementById('confirm-overlay').style.display = 'flex';
  document.getElementById('confirm-msg').textContent = `確定要移除 ${ticker} ${name}？`;
}
function doDelete() {
  if (!pendingDelete) return;
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({action:'remove', ticker: pendingDelete})
  });
  pendingDelete = null;
  document.getElementById('confirm-overlay').style.display = 'none';
  setTimeout(() => loadWatchlist(), 2000);
}
function cancelDelete() {
  pendingDelete = null;
  document.getElementById('confirm-overlay').style.display = 'none';
}

// === Live Price Fetch (from Google Sheet, updated every 5 min by Apps Script) ===
const TICKERS_LIVE = ["0050","0056","00878","00919","00929","00940","006208","00713","00900","00939"];
const PRICE_SHEET_ID = "1GT8LkzWJPo9psHwRIJwjfV2HEoYf7x8eIkI22BhuqIs";

async function fetchLivePrices() {
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${PRICE_SHEET_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`);
    if (!res.ok) throw new Error('Sheet fetch failed: ' + res.status);
    const csv = await res.text();
    const rows = csv.trim().split('\n').slice(1); // skip header
    let updated = 0;
    rows.forEach(row => {
      const cols = row.match(/"([^"]*)"/g)?.map(s => s.replace(/"/g,'')) || [];
      const ticker = cols[0];
      const price = parseFloat(cols[1]);
      const change = parseFloat(cols[2]);
      const changePct = parseFloat(cols[3]);
      const updateTime = cols[4] || '';
      const quarterLine = parseFloat(cols[5]) || null;
      const sparkRaw = cols[6] || '';
      const sparkline = sparkRaw ? sparkRaw.split('|').map(Number).filter(n=>n>0) : [];
      const etf = ETF_DATA.find(e => e.ticker === ticker);
      if (etf && price > 0) {
        etf.price = price;
        etf.change = change;
        etf.changePercent = changePct;
        etf.quarterLine = quarterLine;
        etf.sparkline = sparkline;
        updated++;
      }
    });
    if (updated > 0) {
      renderCards();
      renderSectorCharts();
      renderSparklines();
      const statusEl = document.getElementById("live-status");
      const lastUpdate = rows[0]?.match(/"([^"]*)"/g)?.[4]?.replace(/"/g,'') || '';
      if (statusEl) statusEl.textContent = `✅ 即時報價（${updated}檔）更新：${lastUpdate}`;
    } else {
      throw new Error('No ETF matched');
    }
  } catch(e) {
    const statusEl = document.getElementById("live-status");
    if (statusEl) statusEl.textContent = "⚠️ 即時報價載入失敗，顯示靜態資料";
  }
}
// Auto refresh every 60s during market hours (Mon-Fri 9:00-13:30)
function shouldFetch() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), day = now.getDay();
  return day >= 1 && day <= 5 && ((h === 9) || (h >= 10 && h <= 12) || (h === 13 && m <= 30));
}

async function fetchHoldingsAndDividends() {}

// Auto-refresh during market hours
fetchLivePrices();
setInterval(() => { if(shouldFetch()) fetchLivePrices(); }, 300000);
