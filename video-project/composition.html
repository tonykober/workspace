<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; }
.slide { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; display: flex; align-items: center; justify-content: center; opacity: 0; }
.title-slide { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); flex-direction: column; }
.title-slide h1 { color: #4fc3f7; font-size: 64px; margin-bottom: 20px; }
.title-slide p { color: #90a4ae; font-size: 28px; }
.content-slide { padding: 40px; }
.screenshot { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; object-fit: cover; }
.overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(15,23,42,0.95)); padding: 40px 60px; }
.overlay h2 { color: #4fc3f7; font-size: 36px; margin-bottom: 12px; }
.overlay p { color: #e0e0e0; font-size: 24px; line-height: 1.6; }
.highlight-box { position: absolute; border: 3px solid #4fc3f7; border-radius: 8px; box-shadow: 0 0 20px rgba(79,195,247,0.3); }
.end-slide { background: linear-gradient(135deg, #0f172a 0%, #1a237e 100%); flex-direction: column; }
.end-slide h1 { color: #4fc3f7; font-size: 56px; margin-bottom: 16px; }
.end-slide p { color: #90a4ae; font-size: 32px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseBox { 0%,100% { box-shadow: 0 0 20px rgba(79,195,247,0.3); } 50% { box-shadow: 0 0 40px rgba(79,195,247,0.6); } }
</style>
</head>
<body>
<div data-width="1920" data-height="1080" data-fps="30">

  <!-- Segment 1: Opening title (0-6s) -->
  <audio src="audio/narr-01-opening.mp3" data-start="0" data-volume="1"/>
  <div class="slide title-slide" data-start="0" data-duration="6" data-fade="both">
    <h1 style="animation: fadeIn 0.8s ease-out forwards">▶ 多媒體中心</h1>
    <p style="animation: fadeIn 0.8s ease-out 0.3s forwards; opacity:0">雲端與本地資源管理系統</p>
  </div>

  <!-- Segment 2: Overview (6-18s) -->
  <audio src="audio/narr-02-overview.mp3" data-start="6" data-volume="1"/>
  <div class="slide" data-start="6" data-duration="12" data-fade="both">
    <img class="screenshot" src="screenshots/01-main-list.png"/>
    <div class="highlight-box" style="top:60px;left:10px;width:210px;height:960px;animation:pulseBox 2s infinite" data-start="8" data-duration="4" data-fade="both"></div>
    <div class="overlay">
      <h2>系統總覽</h2>
      <p>支援影片、圖片、音訊、PDF 多格式統一管理<br>左側資料夾結構 ｜ 右側檔案瀏覽區</p>
    </div>
  </div>

  <!-- Segment 3: Cloud Sync (18-30s) -->
  <audio src="audio/narr-03-sync.mp3" data-start="18" data-volume="1"/>
  <div class="slide" data-start="18" data-duration="12" data-fade="both">
    <img class="screenshot" src="screenshots/04-folder-expanded.png"/>
    <div class="overlay">
      <h2>雲端同步</h2>
      <p>一鍵匯入所有雲端檔案<br>匯入完成顯示詳細報告：總項目 8730 ｜ 成功 8730 ｜ 失敗 0</p>
    </div>
  </div>

  <!-- Segment 4: Folders (30-42s) -->
  <audio src="audio/narr-04-folders.mp3" data-start="30" data-volume="1"/>
  <div class="slide" data-start="30" data-duration="12" data-fade="both">
    <img class="screenshot" src="screenshots/01-main-list.png"/>
    <div class="highlight-box" style="top:110px;left:10px;width:210px;height:200px;animation:pulseBox 2s infinite" data-start="32" data-duration="8" data-fade="both"></div>
    <div class="overlay">
      <h2>分類瀏覽</h2>
      <p>2D ｜ 3D ｜ 特效 ｜ Pinterest ｜ UI<br>資料夾樹狀結構快速切換分類</p>
    </div>
  </div>

  <!-- Segment 5: Views (42-52s) -->
  <audio src="audio/narr-05-views.mp3" data-start="42" data-volume="1"/>
  <div class="slide" data-start="42" data-duration="10" data-fade="both">
    <img class="screenshot" src="screenshots/01-main-list.png"/>
    <div class="highlight-box" style="top:10px;right:10px;width:80px;height:40px;left:auto;animation:pulseBox 2s infinite" data-start="43" data-duration="6" data-fade="both"></div>
    <div class="overlay">
      <h2>檢視模式</h2>
      <p>列表模式 ｜ 宮格模式<br>縮圖預覽 · 檔案名稱 · 日期資訊</p>
    </div>
  </div>

  <!-- Segment 6: Search (52-60s) -->
  <audio src="audio/narr-06-search.mp3" data-start="52" data-volume="1"/>
  <div class="slide" data-start="52" data-duration="8" data-fade="both">
    <img class="screenshot" src="screenshots/01-main-list.png"/>
    <div class="highlight-box" style="top:10px;right:100px;width:40px;height:40px;left:auto;animation:pulseBox 2s infinite" data-start="53" data-duration="5" data-fade="both"></div>
    <div class="overlay">
      <h2>搜尋與篩選</h2>
      <p>快速搜尋檔案名稱<br>依類型、日期篩選</p>
    </div>
  </div>

  <!-- Segment 7: Local (60-67s) -->
  <audio src="audio/narr-07-local.mp3" data-start="60" data-volume="1"/>
  <div class="slide" data-start="60" data-duration="7" data-fade="both">
    <img class="screenshot" src="screenshots/01-main-list.png"/>
    <div class="highlight-box" style="bottom:80px;left:10px;width:210px;height:50px;top:auto;animation:pulseBox 2s infinite" data-start="61" data-duration="5" data-fade="both"></div>
    <div class="overlay">
      <h2>本地資源</h2>
      <p>掃描本地資料夾<br>本機檔案納入統一管理</p>
    </div>
  </div>

  <!-- Segment 8: Ending (67-75s) -->
  <audio src="audio/narr-08-ending.mp3" data-start="67" data-volume="1"/>
  <div class="slide end-slide" data-start="67" data-duration="8" data-fade="both">
    <h1 style="animation: fadeIn 0.8s ease-out forwards">▶ 多媒體中心</h1>
    <p style="animation: fadeIn 0.8s ease-out 0.3s forwards; opacity:0">讓您的創作素材井然有序</p>
  </div>

</div>
</body>
</html>
