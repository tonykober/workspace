<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>DVC3 Tier List v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'Noto Sans TC','Noto Sans CJK TC',sans-serif;padding:20px;min-width:1200px;color:#fff}
.title{text-align:center;color:#ffd700;font-size:24px;font-weight:bold;margin-bottom:12px;padding:10px;background:rgba(255,215,0,.1);border-radius:8px;position:relative}
.title button{margin-left:12px;padding:6px 16px;font-size:14px;border:1px solid #ffd700;background:transparent;color:#ffd700;border-radius:6px;cursor:pointer}
.title button:hover{background:rgba(255,215,0,.1)}
.element-row{display:grid;grid-template-columns:48px repeat(14,1fr);gap:3px;margin-bottom:8px}
.element-cell{text-align:center;font-size:14px;font-weight:bold;padding:6px 0;background:rgba(255,255,255,.05);border-radius:6px}
.element-cell img{height:28px;vertical-align:middle}
.tier-section{display:grid;grid-template-columns:48px repeat(14,1fr);gap:3px;margin-bottom:4px}
.tier-label{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#fff;border-radius:6px}
.dragon-cell{height:100px;border-radius:6px;position:relative;overflow:hidden;transition:outline .2s}
.dragon-cell.legendary{background:rgba(255,140,0,.2);border:2px solid #e67e22}
.dragon-cell.epic{background:rgba(142,68,173,.15);border:2px solid #9b59b6}
.dragon-cell.common{background:rgba(52,152,219,.15);border:2px solid #3498db}
.dragon-cell.empty{background:rgba(255,255,255,.02);border:1px dashed #333}
.dragon-cell img{width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;padding:4px 4px 20px 4px;pointer-events:none}
.dragon-cell .name{font-size:12px;color:#fff;text-align:center;position:absolute;bottom:0;left:0;right:0;padding:3px 2px;background:rgba(0,0,0,0.7);line-height:1.1;font-weight:500;border-radius:0 0 6px 6px;pointer-events:none}
.dragon-cell .atk-badge{position:absolute;top:2px;left:2px;font-size:8px;width:16px;height:16px;line-height:16px;text-align:center;border-radius:50%;font-weight:bold;pointer-events:none;z-index:2;color:#fff}
.dragon-cell .atk-badge.phys{background:#e74c3c}
.dragon-cell .atk-badge.magic{background:#3498db}
.dragon-cell.drag-over{outline:3px solid #ffd700}
.dragon-cell.drag-insert-above{border-top:3px solid #0ff !important}
.dragon-cell.drag-insert-below{border-bottom:3px solid #0ff !important}
.dragon-cell[draggable=true]{cursor:grab}
.dragon-cell[draggable=true]:active{cursor:grabbing}
/* Edit mode */
body:not(.edit-mode) .dragon-cell.empty{border:none;background:transparent}
body:not(.edit-mode) #side-panel{display:none}
body:not(.edit-mode) #save-bar{display:none}
body.edit-mode .dragon-cell.empty{min-height:100px}
body.hide-imgs .dragon-cell img{display:none}
body.hide-imgs .dragon-cell{height:auto;min-height:32px}
body.hide-imgs .dragon-cell .name{position:static;background:rgba(0,0,0,0.5);padding:6px 2px;border-radius:6px;font-size:11px}
.elem-btn.active{opacity:1 !important;outline:2px solid #ffd700}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
/* Side panel */
#side-panel{position:fixed;right:0;top:0;width:200px;height:100vh;background:#111;border-left:1px solid #333;overflow-y:auto;padding:10px;z-index:100}
#side-panel h3{color:#ffd700;font-size:14px;margin-bottom:8px;text-align:center}
#side-panel input{width:100%;padding:6px;margin-bottom:8px;background:#222;border:1px solid #444;color:#fff;border-radius:4px;font-size:12px}
.lib-item{width:60px;height:70px;display:inline-block;margin:2px;border-radius:4px;position:relative;overflow:hidden;border:1px solid #444;cursor:grab;vertical-align:top}
.lib-item.legendary{border:2px solid #e67e22}
.lib-item.epic{border:2px solid #9b59b6}
.lib-item.common{border:2px solid #3498db}
.lib-item img{width:100%;height:50px;object-fit:contain}
.lib-item .ln{font-size:8px;color:#ccc;text-align:center;line-height:1;padding:1px}
/* Save bar */
#save-bar{position:fixed;bottom:0;left:0;right:200px;background:#111;border-top:1px solid #333;padding:10px;text-align:center;z-index:100}
#save-bar button{padding:8px 20px;margin:0 8px;border-radius:6px;border:none;cursor:pointer;font-size:14px}
#save-bar .btn-local{background:#27ae60;color:#fff}
#save-bar .btn-github{background:#3498db;color:#fff}
#save-bar .btn-load{background:#e67e22;color:#fff}
#save-bar .status{color:#888;font-size:12px;margin-top:4px}
.legend{display:flex;gap:30px;justify-content:center;margin-top:14px;color:#ccc;font-size:14px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:16px;height:16px;border-radius:50%}
.legend-dot.legendary{background:rgba(255,140,0,.3);border:2px solid #e67e22}
.legend-dot.epic{background:rgba(142,68,173,.3);border:2px solid #9b59b6}
.legend-dot.common{background:rgba(52,152,219,.3);border:2px solid #3498db}
.footer{text-align:center;color:#888;font-size:11px;margin-top:10px;margin-bottom:60px}
body.edit-mode{padding-right:220px}

</style></head><body>

<script>
// === CONFIG ===
var TIERS = ['S','A','B','C','D'];
var TIER_COLORS = {S:'#e74c3c',A:'#e67e22',B:'#f1c40f',C:'#27ae60',D:'#3498db'};
var TIER_TEXT = {B:'#000'};
var ELEMENTS = ['fire','water','wind','steel','earth','lightning','light','dark','dream','soul','dawn','dusk','holy','chaos'];
var ELEM_NAMES = {fire:'火',water:'水',wind:'風',steel:'鋼',earth:'土',lightning:'雷',light:'光',dark:'暗',dream:'夢',soul:'靈魂',dawn:'黎明',dusk:'黃昏',holy:'神聖',chaos:'混沌'};
var ELEM_COLORS = {fire:'#e74c3c',water:'#3498db',wind:'#2ecc71',steel:'#95a5a6',earth:'#cd853f',lightning:'#f1c40f',light:'#f39c12',dark:'#8e44ad',dream:'#9b59b6',soul:'#1abc9c',dawn:'#e67e22',dusk:'#c0392b',holy:'#ffd700',chaos:'#555'};

var GITHUB_REPO = 'tonykober/workspace';
var GITHUB_PATH = 'data/dvc3-tierlist-data.json';
var GITHUB_TOKEN = '';

// Default data (from old version layout)
var DEFAULT_DATA = {
 S:[
  {id:'dragonslayer',name:'屠龍者',rarity:'legendary'},{id:'frostdragon',name:'冰河古龍',rarity:'legendary'},{id:'plumos',name:'梅龍',rarity:'legendary'},{id:'blackarmor',name:'黑甲龍',rarity:'epic'},{id:'powerdragon',name:'力龍',rarity:'legendary'},{id:'lightingdragon',name:'閃電古龍',rarity:'legendary'},{id:'selora',name:'賽勒拉',rarity:'legendary'},{id:'fides',name:'菲達斯',rarity:'legendary'},{id:'crevasse',name:'克雷巴斯',rarity:'legendary'},{id:'centura',name:'聖圖拉',rarity:'legendary'},{id:'angelJr',name:'天使龍二世',rarity:'legendary'},{id:'non',name:'虛無',rarity:'legendary'},{id:'goddragon',name:'古代神龍',rarity:'legendary'},{id:'darknix',name:'黑暗尼斯',rarity:'legendary'},
  {id:'jujak',name:'朱雀',rarity:'epic'},{id:'paruparu',name:'暖芽',rarity:'legendary'},{id:'applecheek',name:'蘋果肌',rarity:'epic'},{id:'sharptail',name:'尖尾龍',rarity:'epic'},{id:'eggdragon',name:'蛋龍',rarity:'epic'},{id:'thunderboltdragon',name:'雷電龍',rarity:'epic'},{id:'spicy',name:'辛辣龍',rarity:'epic'},{id:'serpentdragon',name:'蛇龍',rarity:'epic'},{id:'nebula',name:'星雲',rarity:'epic'},{id:'lucio',name:'盧西歐',rarity:'legendary'},{id:'florea',name:'芙蘿蕾',rarity:'legendary'},{id:'blackdragon',name:'黑龍',rarity:'epic'},{id:'granos',name:'格拉諾思',rarity:'epic'},{id:'shadowdragon',name:'影龍',rarity:'epic'},
  {id:'helldragon',name:'地獄龍',rarity:'epic'},{id:'tiamat',name:'提阿瑪特',rarity:'legendary'},{id:'zephyros',name:'澤費羅斯',rarity:'epic'},{id:'obex',name:'歐沛克斯',rarity:'legendary'},{id:null},{id:null},{id:'rafael',name:'拉斐爾',rarity:'epic'},{id:'centipededragon',name:'蜈蚣',rarity:'epic'},{id:'henes',name:'軒尼斯',rarity:'epic'},{id:'dreaden',name:'德雷登',rarity:'epic'},{id:null},{id:'aila',name:'艾拉',rarity:'epic'},{id:null},{id:null}
 ],
 A:[
  {id:'enturas',name:'恩圖拉斯',rarity:'epic'},{id:'posionriver',name:'毒流',rarity:'epic'},{id:'bluedragon',name:'青龍',rarity:'epic'},{id:'fat',name:'胖胖龍',rarity:'epic'},{id:'tumpy',name:'坦皮',rarity:'epic'},{id:'clouddragon',name:'雲龍',rarity:'epic'},{id:'haze',name:'霧霾龍',rarity:'epic'},{id:'ninjadragon',name:'忍者龍',rarity:'epic'},{id:'aliendragon',name:'外星龍',rarity:'epic'},{id:'mummydragon',name:'木乃伊',rarity:'epic'},{id:'whitedragon',name:'白龍',rarity:'epic'},{id:'characen',name:'彩紋龍',rarity:'epic'},{id:null},{id:null},
  {id:'patroa',name:'派特羅亞',rarity:'epic'},{id:'hyeonmu',name:'玄武',rarity:'epic'},{id:'typhoondragon',name:'颱風龍',rarity:'epic'},{id:null},{id:'muddragon',name:'泥龍',rarity:'epic'},{id:'bluefiretail',name:'青火尾',rarity:'epic'},{id:'solardragon',name:'太陽龍',rarity:'epic'},{id:'kleptos',name:'盜賊龍',rarity:'epic'},{id:'pierrotdragon',name:'小丑',rarity:'epic'},{id:'griptor',name:'鐵鈎龍',rarity:'epic'},{id:'toddletomtom',name:'托德湯姆',rarity:'epic'},{id:null},{id:null},{id:null}
 ],
 B:[
  {id:'taros',name:'塔洛斯',rarity:'epic'},{id:'swampdragon',name:'沼澤龍',rarity:'epic'},{id:'totemdragon',name:'圖騰龍',rarity:'epic'},{id:null},{id:null},{id:'whitethunderdragon',name:'白雷龍',rarity:'epic'},{id:null},{id:'lunera',name:'盧內拉',rarity:'epic'},{id:'goldie',name:'金雕龍',rarity:'epic'},{id:null},{id:null},{id:null},{id:null},{id:null},
  {id:'siamesedragon',name:'連體龍',rarity:'epic'},{id:'sharkdragon',name:'鯊龍',rarity:'epic'},{id:'liberte',name:'利貝特',rarity:'epic'},{id:null},{id:null},{id:null},{id:null},{id:'lagtail',name:'雷泰爾',rarity:'epic'},{id:null},{id:null},{id:null},{id:null},{id:null},{id:null}
 ],
 C:[
  {id:'magnello',name:'火涅洛',rarity:'epic'},{id:null},{id:'pinkbell',name:'粉鈴',rarity:'epic'},{id:null},{id:null},{id:null},{id:null},{id:null},{id:null},{id:null},{id:null},{id:null},{id:null},{id:null}
 ],
 D:[]
};

var tierData = null;
var editMode = false;
var imgMode = 'icon'; // 'icon' or 'chroma'
var tierLimits = {S:3,A:2,B:2,C:1,D:1};

// === INIT ===
function init() {
 var savedLimits = localStorage.getItem('dvc3-tier-limits');
 if (savedLimits) tierLimits = JSON.parse(savedLimits);
 if (location.search.includes('edit=1')) { enterEdit(); }
 loadData();
}

function loadData() {
 // Priority: GitHub > localStorage > DEFAULT_DATA
 loadFromGitHubAuto();
}

async function loadFromGitHubAuto() {
 try {
  var resp = await fetch('https://api.github.com/repos/'+GITHUB_REPO+'/contents/'+GITHUB_PATH);
  if (resp.ok) {
   var data = await resp.json();
   var json = decodeURIComponent(escape(atob(data.content)));
   tierData = JSON.parse(json);
   enrichRarity();
   localStorage.setItem('dvc3-tierlist-v2', JSON.stringify(tierData));
   render();
   return;
  }
 } catch(e) {}
 // Fallback to localStorage
 var saved = localStorage.getItem('dvc3-tierlist-v2');
 if (saved) { tierData = JSON.parse(saved); enrichRarity(); }
 else { tierData = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
 render();
}

function enrichRarity() {
 var rarityMap = {};
 var atkMap = {};
 ALL_DRAGONS.forEach(function(d){ rarityMap[d.id] = d.rarity || 'epic'; atkMap[d.id] = d.atkType || ''; });
 TIERS.forEach(function(tier) {
  if (!tierData[tier]) return;
  tierData[tier].forEach(function(d) {
   if (d && d.id) {
    if (!d.rarity) d.rarity = rarityMap[d.id] || 'epic';
    if (!d.atkType) d.atkType = atkMap[d.id] || '';
   }
  });
 });
}

// === RENDER ===
function render() {
 var container = document.getElementById('grid-container');
 var html = '';
 // Element row
 html += '<div class="element-row"><div></div>';
 ELEMENTS.forEach(function(e) {
  html += '<div class="element-cell" style="color:'+ELEM_COLORS[e]+'"><img src="images/dvc3-tierlist/elements/'+e+'.png" style="height:28px;vertical-align:middle"><br>'+ELEM_NAMES[e]+'</div>';
 });
 html += '</div>';
 // Tiers
 TIERS.forEach(function(tier) {
  var items = tierData[tier] || [];
  var rows = tierLimits[tier] || Math.max(1, Math.ceil(items.length / 14));
  html += '<div class="tier-section" style="grid-template-rows:repeat('+rows+',1fr)">';
  html += '<div class="tier-label" style="background:'+TIER_COLORS[tier]+';grid-row:1/'+(rows+1)+(TIER_TEXT[tier]?';color:'+TIER_TEXT[tier]:'')+'">' + tier + (editMode ? '<br><input type="number" min="1" max="10" value="'+tierLimits[tier]+'" style="width:28px;font-size:11px;text-align:center;margin-top:4px;background:#333;color:#fff;border:1px solid #555;border-radius:3px" onchange="setTierLimit(\''+tier+'\',this.value)">' : '') + '</div>';
  for (var i = 0; i < rows * 14; i++) {
   var d = items[i];
   if (d && d.id) {
    html += '<div class="dragon-cell '+(d.rarity||'epic')+'" draggable="'+(editMode?'true':'false')+'" data-tier="'+tier+'" data-idx="'+i+'" ondragstart="onDragStart(event)" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">';
    html += '<img src="'+(imgMode==='chroma'?'images/dvc3-tierlist/chroma/'+d.id+'_adult.webp':'images/dvc3-tierlist/'+d.id+'_icon.png')+'" onerror="this.style.display=\'none\'">';
    if (d.atkType) html += '<span class="atk-badge '+ d.atkType +'">'+(d.atkType==='phys'?'\u7269':'\u9B54')+'</span>';
    html += '<div class="name">'+d.name+'</div>';
    if (editMode) html += '<span style="position:absolute;top:2px;right:2px;cursor:pointer;font-size:16px;color:#f00;z-index:5" onclick="removeItem(\''+tier+'\','+i+')">&times;</span>';
    html += '</div>';
   } else {
    html += '<div class="dragon-cell empty" data-tier="'+tier+'" data-idx="'+i+'" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)"></div>';
   }
  }
  html += '</div>';
 });
 container.innerHTML = html;
}

// === DRAG & DROP ===
var dragSource = null;
var dropMode = 'swap'; // 'swap' or 'insert'

function onDragStart(e) {
 if (!editMode) return;
 dragSource = { tier: e.target.dataset.tier, idx: parseInt(e.target.dataset.idx), fromLib: false };
 e.dataTransfer.effectAllowed = 'move';
 e.dataTransfer.setData('text/plain','');
}
function onDragOver(e) {
 if (!editMode) return;
 e.preventDefault();
 var cell = e.currentTarget;
 var rect = cell.getBoundingClientRect();
 var y = e.clientY - rect.top;
 var ratio = y / rect.height;
 cell.classList.remove('drag-over','drag-insert-above','drag-insert-below');
 if (cell.classList.contains('empty')) {
  cell.classList.add('drag-over');
  dropMode = 'swap';
 } else if (ratio < 0.25 || ratio > 0.75) {
  cell.classList.add('drag-insert-below');
  dropMode = 'insert';
 } else {
  cell.classList.add('drag-over');
  dropMode = 'swap';
 }
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over','drag-insert-above','drag-insert-below'); }
function onDrop(e) {
 if (!editMode) return;
 e.preventDefault();
 e.currentTarget.classList.remove('drag-over','drag-insert-above','drag-insert-below');
 var targetTier = e.currentTarget.dataset.tier;
 var targetIdx = parseInt(e.currentTarget.dataset.idx);
 var targetCol = targetIdx % 14;

 var newItem;
 if (dragSource && dragSource.fromLib) {
  newItem = JSON.parse(JSON.stringify(dragSource.item));
 } else if (dragSource) {
  newItem = tierData[dragSource.tier][dragSource.idx];
  tierData[dragSource.tier][dragSource.idx] = {id:null};
 } else return;

 if (dropMode === 'insert') {
  insertAtPosition(targetTier, targetIdx, targetCol, newItem);
  enforceTierLimits(targetTier, targetCol);
 } else {
  // Swap mode
  var items = tierData[targetTier];
  while (items.length <= targetIdx) items.push({id:null});
  if (dragSource && !dragSource.fromLib) {
   // Put displaced back to source
   tierData[dragSource.tier][dragSource.idx] = items[targetIdx] || {id:null};
  }
  items[targetIdx] = newItem;
 }
 dragSource = null;
 render();
 saveLocal();
}

function insertAtPosition(tier, idx, col, newItem) {
 var items = tierData[tier];
 while (items.length <= idx) items.push({id:null});
 if (!items[idx] || !items[idx].id) {
  items[idx] = newItem;
  return;
 }
 var displaced = items[idx];
 items[idx] = newItem;
 var pushIdx = idx + 14;
 while (pushIdx < items.length && items[pushIdx] && items[pushIdx].id) {
  var temp = items[pushIdx];
  items[pushIdx] = displaced;
  displaced = temp;
  pushIdx += 14;
 }
 while (items.length <= pushIdx) items.push({id:null});
 items[pushIdx] = displaced;
}

function enforceTierLimits(tier, col) {
 var limit = tierLimits[tier] || 99;
 var items = tierData[tier];
 // Count items in this column
 var colItems = [];
 for (var i = col; i < items.length; i += 14) {
  if (items[i] && items[i].id) colItems.push(i);
 }
 // If over limit, push last one to next tier
 if (colItems.length > limit) {
  var lastIdx = colItems[colItems.length - 1];
  var overflow = items[lastIdx];
  items[lastIdx] = {id:null};
  var tierIdx = TIERS.indexOf(tier);
  if (tierIdx < TIERS.length - 1) {
   var nextTier = TIERS[tierIdx + 1];
   tierData[nextTier] = tierData[nextTier] || [];
   insertAtPosition(nextTier, col, col, overflow);
   enforceTierLimits(nextTier, col);
  }
 }
}

function setTierLimit(tier, val) {
 tierLimits[tier] = parseInt(val) || 1;
 localStorage.setItem('dvc3-tier-limits', JSON.stringify(tierLimits));
 // Immediately enforce on all columns
 for (var col = 0; col < 14; col++) {
  enforceTierLimits(tier, col);
 }
 render();
 saveLocal();
}
function removeItem(tier, idx) {
 tierData[tier][idx] = {id:null};
 render(); saveLocal();
}

var libElemFilter = '';
function renderLib(filter) {
 var grid = document.getElementById('lib-grid');
 var html = '';
 ALL_DRAGONS.forEach(function(d) {
  if (filter && d.name.indexOf(filter) === -1 && d.id.indexOf(filter.toLowerCase()) === -1) return;
  if (libElemFilter && d.elem !== libElemFilter) return;
  html += '<div class="lib-item '+(d.rarity||'epic')+'" draggable="true" ondragstart="onLibDrag(event,\''+d.id+'\')">';
  html += '<img src="images/dvc3-tierlist/'+d.id+'_icon.png" onerror="this.style.display=\'none\'">';
  html += '<div class="ln">'+d.name+'</div></div>';
 });
 grid.innerHTML = html;
}
function onLibDrag(e, id) {
 var item = ALL_DRAGONS.find(function(d){return d.id===id;});
 dragSource = { fromLib: true, item: item };
 e.dataTransfer.effectAllowed = 'copy';
 e.dataTransfer.setData('text/plain','');
}
function filterLib() { renderLib(document.getElementById('lib-search').value); }
function filterElem(el) {
 libElemFilter = (libElemFilter === el) ? '' : el;
 document.querySelectorAll('.elem-btn').forEach(function(b){b.classList.toggle('active',b.dataset.elem===libElemFilter);});
 filterLib();
}

// === EDIT MODE ===
function toggleEdit() {
 if (editMode) exitEdit(); else enterEdit();
}
function enterEdit() {
 editMode = true;
 document.body.classList.add('edit-mode');
 document.getElementById('toggleBtn').style.display = 'none';
 document.getElementById('editBtn').innerHTML = '&#10005; Exit Edit';
 // Render element filter buttons
 var ef = document.getElementById('elem-filters');
 var h = '';
 ELEMENTS.forEach(function(e){h+='<img class="elem-btn" data-elem="'+e+'" onclick="filterElem(\''+e+'\')" src="images/dvc3-tierlist/elements/'+e+'.png" style="height:22px;margin:2px;cursor:pointer;opacity:0.5;border-radius:3px">';});
 ef.innerHTML = h;
 render(); renderLib('');
}
function exitEdit() {
 editMode = false;
 document.body.classList.remove('edit-mode');
 document.getElementById('toggleBtn').style.display = '';
 document.getElementById('editBtn').innerHTML = '&#9998; Edit';
 render();
}

// === SAVE/LOAD ===
function saveLocal() {
 localStorage.setItem('dvc3-tierlist-v2', JSON.stringify(tierData));
}
function setStatus(msg) { document.getElementById('save-status').textContent = msg; }

async function saveToGitHub() {
 var token = GITHUB_TOKEN || localStorage.getItem('gh-token') || prompt('GitHub Personal Access Token:');
 if (!token) return;
 GITHUB_TOKEN = token;
 localStorage.setItem('gh-token', token);
 setStatus('Saving to GitHub...');
 try {
  // Get current file SHA
  var getResp = await fetch('https://api.github.com/repos/'+GITHUB_REPO+'/contents/'+GITHUB_PATH, {
   headers: { 'Authorization': 'token ' + token }
  });
  var sha = '';
  if (getResp.ok) { var data = await getResp.json(); sha = data.sha; }
  // Commit
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(tierData, null, 2))));
  var body = { message: 'Update tier list data', content: content };
  if (sha) body.sha = sha;
  var putResp = await fetch('https://api.github.com/repos/'+GITHUB_REPO+'/contents/'+GITHUB_PATH, {
   method: 'PUT',
   headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
   body: JSON.stringify(body)
  });
  if (putResp.ok) { setStatus('Saved to GitHub!'); }
  else { var err = await putResp.json(); setStatus('Error: ' + err.message); }
 } catch(e) { setStatus('Error: ' + e.message); }
}

async function loadFromGitHub() {
 setStatus('Loading from GitHub...');
 try {
  var resp = await fetch('https://api.github.com/repos/'+GITHUB_REPO+'/contents/'+GITHUB_PATH);
  if (resp.ok) {
   var data = await resp.json();
   var json = decodeURIComponent(escape(atob(data.content)));
   tierData = JSON.parse(json);
   localStorage.setItem('dvc3-tierlist-v2', JSON.stringify(tierData));
   render();
   setStatus('Loaded from GitHub');
  } else { setStatus('No data on GitHub yet, using default'); }
 } catch(e) { setStatus('Error: ' + e.message); }
}

 imgMode = (imgMode === 'icon') ? 'chroma' : 'icon';
