<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>匯出 PDF — 街機遊戲美術開發製程分析 v2.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:2rem;line-height:1.6;color:#1a1a1a;background:#fff}
h1{font-size:1.5rem;text-align:center;margin-bottom:.5rem}
.subtitle{text-align:center;color:#666;margin-bottom:2rem;font-size:.9rem}
h2{font-size:1.2rem;margin:2rem 0 .8rem;border-left:4px solid #333;padding-left:10px;page-break-after:avoid}
h3{font-size:1rem;margin:1.2rem 0 .5rem;page-break-after:avoid}
h4{font-size:.9rem;margin:1rem 0 .4rem}
table{width:100%;border-collapse:collapse;margin:.8rem 0;font-size:.8rem;page-break-inside:avoid}
th,td{padding:6px 8px;border:1px solid #ccc;text-align:left}
th{background:#f0f0f0;font-weight:600}
ul,ol{margin:.5rem 0 .8rem 1.5rem}
li{margin-bottom:.3rem}
.card{border:1px solid #ddd;border-radius:6px;padding:1rem;margin:.8rem 0;page-break-inside:avoid}
.section-divider{page-break-before:always;border-top:3px solid #333;margin-top:3rem;padding-top:1rem}
.loading{text-align:center;padding:4rem;font-size:1.2rem;color:#666}
code{background:#f5f5f5;padding:2px 5px;border-radius:3px;font-size:.8rem}
pre{background:#f5f5f5;padding:1rem;border-radius:6px;overflow-x:auto;font-size:.75rem;margin:.8rem 0}
@media print{
body{padding:0}
.no-print{display:none}
}
</style>
</head>
<body>
<div class="no-print" style="text-align:center;margin-bottom:2rem;padding:1rem;background:#f0f8ff;border-radius:8px">
<p style="margin-bottom:.5rem">頁面載入完成後將自動開啟列印對話框。請選擇「另存為 PDF」。</p>
<button onclick="window.print()" style="padding:8px 20px;font-size:14px;cursor:pointer;border-radius:6px;border:1px solid #333">📄 手動列印/存 PDF</button>
</div>
<h1>🎨 街機遊戲 — 美術開發製程分析（v2.1）</h1>
<p class="subtitle">獨立三區塊：現況盤點 · 製作規劃 · 執行規範</p>
<div id="content"><p class="loading">載入中...</p></div>
<script>
async function load(){
  const pages=['game-dev-analysis-v2.1-a.html','game-dev-analysis-v2.1-b.html','game-dev-analysis-v2.1-c.html'];
  const labels=['A 區：現況盤點','B 區：新遊戲製作規劃','C 區：執行規範'];
  let html='';
  for(let i=0;i<pages.length;i++){
    try{
      const res=await fetch(pages[i]);
      const text=await res.text();
      const parser=new DOMParser();
      const doc=parser.parseFromString(text,'text/html');
      const content=doc.querySelector('.content')||doc.querySelector('main')||doc.body;
      if(content){
        html+=(i>0?'<div class="section-divider"></div>':'');
        html+='<h2 style="font-size:1.4rem;border-left:none;text-align:center;margin:1rem 0">'+labels[i]+'</h2>';
        html+=content.innerHTML;
      }
    }catch(e){html+='<p>載入 '+pages[i]+' 失敗</p>';}
  }
  document.getElementById('content').innerHTML=html;
  // Remove any nav elements that got pulled in
  document.querySelectorAll('.top-nav,.sidebar,.guide-hint,nav,aside').forEach(el=>el.remove());
  setTimeout(()=>window.print(),1000);
}
load();
</script>
</body>
</html>
